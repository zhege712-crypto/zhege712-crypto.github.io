<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>目录 · 诗歌漂流</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1c1c1b; --charcoal:#373735; --steel:#74736f; --fog:#b9b7b0;
  --paper:#eceae5; --paper-2:#e0ddd6; --white:#faf9f6;
  --accent-red:#e0393e; --accent-cobalt:#2f5fa8; --accent-gold:#e8a33d;
  --font-display:'Fraunces',serif; --font-body:'Inter',sans-serif; --font-mono:'Space Mono',monospace;
  --maxw:820px;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--paper); color:var(--ink); font-family:var(--font-body); line-height:1.6; }
a{ color:inherit; text-decoration:none; }
.wrap{ max-width:var(--maxw); margin:0 auto; padding:0 28px; }

header{ padding:26px 0; border-bottom:1px solid var(--paper-2); }
header .wrap{ max-width:960px; display:flex; justify-content:space-between; align-items:center; }
.logo{ font-family:var(--font-display); font-weight:600; }
.back-link{ font-family:var(--font-mono); font-size:0.75rem; color:var(--steel); }
.back-link:hover{ color:var(--accent-red); }

.page-head{ padding:60px 0 30px; }
.eyebrow{ font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.2em; color:var(--accent-red); text-transform:uppercase; margin-bottom:12px; }
.page-head h1{ font-family:var(--font-display); font-weight:500; font-size:clamp(1.8rem,5vw,2.6rem); }

.catalog-list{ border-top:1px solid var(--fog); padding-bottom:120px; }
.catalog-row{
  display:grid; grid-template-columns:90px 1fr auto; gap:20px; align-items:baseline;
  padding:22px 0; border-bottom:1px solid var(--fog); transition:padding-left 0.3s ease;
}
.catalog-row:hover{ padding-left:12px; background:var(--white); }
.catalog-row .c-date{ font-family:var(--font-mono); font-size:0.7rem; color:var(--steel); }
.catalog-row h3{ font-family:var(--font-display); font-weight:500; font-size:1.2rem; transition:color 0.3s ease; }
.catalog-row:hover h3{ color:var(--accent-red); }
.catalog-row .c-arrow{ font-family:var(--font-mono); font-size:0.72rem; color:var(--steel); }

.empty-state{ text-align:center; color:var(--steel); font-family:var(--font-mono); font-size:0.85rem; padding:60px 0; }

footer{ padding:30px 0; text-align:center; font-family:var(--font-mono); font-size:0.68rem; color:var(--steel); background:var(--ink); }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="logo">诗歌漂流 · 目录</div>
    <a class="back-link" href="poems.html">← 返回诗歌漂流</a>
  </div>
</header>

<div class="wrap">
  <div class="page-head">
    <div class="eyebrow">Catalog</div>
    <h1>目录</h1>
  </div>

  <div class="catalog-list" id="catalog-list">
    <div class="empty-state">加载中…</div>
  </div>
</div>

<footer>© 2026 · 诗歌漂流</footer>

<script>
fetch('poems/poems.json?t=' + Date.now())
  .then(function(r){ return r.json(); })
  .then(function(poems){
    var list = document.getElementById('catalog-list');
    if(!poems || poems.length === 0){
      list.innerHTML = '<div class="empty-state">暂时还没有诗，敬请期待。</div>';
      return;
    }
    poems.sort(function(a,b){ return new Date(b.date) - new Date(a.date); });
    list.innerHTML = poems.map(function(p){
      return '' +
        '<a class="catalog-row" href="poem.html?id=' + encodeURIComponent(p.id) + '">' +
          '<span class="c-date">' + p.date + '</span>' +
          '<h3>' + p.title + '</h3>' +
          '<span class="c-arrow">阅读 →</span>' +
        '</a>';
    }).join('');
  })
  .catch(function(){
    document.getElementById('catalog-list').innerHTML = '<div class="empty-state">目录加载失败，检查 poems/poems.json 是否存在。</div>';
  });
</script>

</body>
</html>
