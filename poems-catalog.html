<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>目录 · 诗歌漂流</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1c1c1b; --charcoal:#373735; --steel:#74736f; --fog:#b9b7b0;
  --paper:#eceae5; --paper-2:#e0ddd6; --white:#faf9f6;
  --accent-red:#e0393e; --accent-cobalt:#2f5fa8; --accent-gold:#e8a33d;
  --font-display:'Fraunces',serif; --font-body:'Inter',sans-serif; --font-mono:'Space Mono',monospace;
  --maxw:820px;
}
[data-theme="dark"] {
  --ink: #ecece5;
  --charcoal: #c4c4be;
  --steel: #8a8a85;
  --fog: #4a4a45;
  --paper: #1a1a19;
  --paper-2: #2a2a27;
  --white: #222221;
  --accent-red: #e55a5f;
  --accent-gold: #d4a373;
}
[data-theme="eye-care"] {
  --paper: #e9f0e1;
  --paper-2: #dce6cf;
  --white: #f4f8ee;
  --ink: #3a4632;
  --charcoal: #5c6a4f;
  --steel: #82906f;
  --fog: #c6d3b4;
  --accent-red: #b2674f;
  --accent-cobalt: #5f7f92;
  --accent-gold: #bda26c;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--paper); color:var(--ink); font-family:var(--font-body); line-height:1.6; transition: background 0.3s ease, color 0.3s ease; }
a{ color:inherit; text-decoration:none; }
.wrap{ max-width:var(--maxw); margin:0 auto; padding:0 28px; }
header{ padding:26px 0; border-bottom:1px solid var(--paper-2); }
header .wrap{ max-width:960px; display:flex; justify-content:space-between; align-items:center; }
.logo{ font-family:var(--font-display); font-weight:600; }
.back-link{ font-family:var(--font-mono); font-size:0.75rem; color:var(--steel); }
.back-link:hover{ color:var(--accent-red); }
.page-head{ padding:60px 0 30px; }
.eyebrow{ font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.2em; color:var(--accent-red); text-transform:uppercase; margin-bottom:12px; }
.page-head h1{ font-family:var(--font-display); font-weight:500; font-size:clamp(1.8rem,5vw,2.6rem); }
.series-block{ margin-bottom:50px; }
.series-block h2{ font-family:var(--font-display); font-weight:500; font-size:1.25rem; margin:36px 0 4px; color:var(--accent-red); }
.series-block:first-child h2{ margin-top:0; }
.subseries-head{
  display:inline-flex; align-items:center; gap:8px;
  font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.12em; color:var(--charcoal);
  margin:26px 0 4px; padding:7px 16px; border-radius:20px;
  background:var(--white);
  background:color-mix(in srgb, var(--white) 55%, transparent);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  border:1px solid var(--fog);
  transition: background 0.3s ease, border-color 0.3s ease;
}
.subseries-head::before{ content:''; width:6px; height:6px; border-radius:50%; background:var(--accent-gold); flex-shrink:0; }

::selection{ background:var(--accent-gold); color:#fff; }
.catalog-row .c-author{ font-family:'Kaiti SC','STKaiti','KaiTi',serif; font-size:0.88rem; color:var(--charcoal); }

.catalog-controls{ display:flex; justify-content:space-between; align-items:center; gap:14px; margin:36px 0 0; flex-wrap:wrap; }
.view-toggle{
  display:inline-flex; gap:2px; padding:4px; border-radius:24px; border:1px solid var(--fog);
  background:var(--white); background:color-mix(in srgb, var(--white) 55%, transparent);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
}
.view-toggle button{
  border:none; background:transparent; padding:8px 18px; border-radius:20px;
  font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.06em; color:var(--steel);
  cursor:pointer; transition:background 0.25s ease, color 0.25s ease;
}
.view-toggle button.active{ background:var(--ink); color:var(--paper); }
.random-btn{
  font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.06em;
  padding:11px 20px; border-radius:22px; border:1px solid var(--fog);
  background:transparent; color:var(--charcoal); cursor:pointer;
  transition:background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
}
.random-btn:hover{ background:var(--accent-red); color:var(--white); border-color:var(--accent-red); }

/* 树状图模式 */
.tree-branch > .branch-head{
  display:flex; align-items:center; gap:10px; width:100%; padding:16px 6px;
  background:none; border:none; cursor:pointer; text-align:left;
  font-family:var(--font-display); font-weight:500; font-size:1.15rem; color:var(--accent-red);
}
.branch-head .tri{ font-size:0.62rem; color:var(--steel); transition:transform 0.25s ease; }
.tree-branch.collapsed > .branch-head .tri{ transform:rotate(-90deg); }
.branch-count{
  font-family:var(--font-mono); font-size:0.62rem; font-weight:400; color:var(--steel);
  border:1px solid var(--fog); border-radius:12px; padding:2px 10px;
}
.branch-children{ margin-left:10px; padding-left:20px; border-left:1px solid var(--fog); }
.tree-branch.collapsed > .branch-children{ display:none; }
.tree-branch.sub > .branch-head{
  font-family:var(--font-mono); font-size:0.78rem; letter-spacing:0.1em;
  color:var(--charcoal); padding:12px 6px;
}
.tree-leaf{
  display:flex; justify-content:space-between; align-items:baseline; gap:16px;
  padding:9px 6px; position:relative;
  transition:color 0.25s ease, padding-left 0.25s ease;
}
.tree-leaf::before{ content:''; position:absolute; left:-20px; top:50%; width:13px; height:1px; background:var(--fog); }
.tree-leaf:hover{ color:var(--accent-red); padding-left:12px; }
.tree-leaf .leaf-title{ font-size:0.95rem; }
.tree-leaf .leaf-meta{ font-family:var(--font-mono); font-size:0.62rem; color:var(--steel); white-space:nowrap; }
.catalog-list{ padding-bottom:120px; }
.catalog-row{
  display:grid; grid-template-columns:90px 1fr auto; gap:20px; align-items:baseline;
  padding:22px 0; border-bottom:1px solid var(--fog); transition:padding-left 0.3s ease;
}
.catalog-row:hover{ padding-left:12px; background:var(--white); }
.catalog-row .c-date{ font-family:var(--font-mono); font-size:0.7rem; color:var(--steel); }
.catalog-row h3{ font-family:var(--font-display); font-weight:500; font-size:1.2rem; transition:color 0.3s ease; }
.catalog-row:hover h3{ color:var(--accent-red); }
.catalog-row .c-arrow{ font-family:var(--font-mono); font-size:0.72rem; color:var(--steel); }
.empty-state{ text-align:center; color:var(--steel); font-family:var(--font-mono); font-size:0.85rem; padding:60px 0; }
.search-box{ margin:36px 0 10px; position:relative; }
.search-box input{
  width:100%; padding:13px 16px 13px 40px; border:1px solid var(--paper-2);
  background:var(--white); font-family:var(--font-body); font-size:0.92rem; color:var(--ink);
}
.search-box input:focus{ outline:none; border-color:var(--accent-red); }
.search-box svg{
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  width:16px; height:16px; stroke:var(--steel); fill:none; stroke-width:1.6;
}
.search-hint{ font-family:var(--font-mono); font-size:0.7rem; color:var(--steel); margin-top:8px; }
footer{ padding:30px 0; text-align:center; font-family:var(--font-mono); font-size:0.68rem; color:var(--steel); background:var(--ink); }
.greek-divider{ width:100px; height:10px; color:var(--fog); margin:16px 0 6px; display:block; }

.side-theme{
  position:fixed; left:24px; bottom:100px; z-index:150;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  background:rgba(255,255,255,0.4);
  background:color-mix(in srgb, var(--white) 55%, transparent);
  backdrop-filter:blur(14px) saturate(160%); -webkit-backdrop-filter:blur(14px) saturate(160%);
  box-shadow:0 8px 24px rgba(28,28,27,0.08), inset 0 1px 0 rgba(255,255,255,0.35);
  padding:10px 8px; border-radius:28px; border:1px solid var(--fog);
  transition: background 0.3s ease, border-color 0.3s ease;
}
.side-theme .theme-btn{
  width:34px; height:34px; border-radius:50%; border:none;
  background:transparent; cursor:pointer;
  transition:background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
  display:flex; align-items:center; justify-content:center;
  padding:0; position:relative;
}
.side-theme .theme-btn svg{
  width:22px; height:22px; stroke:var(--charcoal); stroke-width:1.8;
  fill:none; display:block;
  transition: stroke 0.25s ease;
}
.side-theme .theme-btn:hover{ background:var(--paper-2); transform:scale(1.08); }
.side-theme .theme-btn.active{
  background:var(--accent-gold);
  box-shadow:0 0 0 2px var(--accent-gold);
}
.side-theme .theme-btn.active svg{ stroke:var(--white); }
.side-theme .line{
  width:2px; height:10px; background:var(--fog); border-radius:1px;
  transition: background 0.3s ease;
}
@media (max-width:1180px){ .side-theme{ display:none; } }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="logo">诗歌漂流 · 目录</div>
    <a class="back-link" href="poems.html">← 返回诗歌漂流</a>
  </div>
</header>
<div class="wrap">
  <div class="page-head">
    <div class="eyebrow">Catalog</div>
    <h1>目录</h1>
    <svg class="greek-divider" viewBox="0 0 100 10" fill="none" stroke="currentColor" stroke-width="1.2">
      <path d="M0 5 H8 V0 H16 V10 H24 V0 H32 V10 H40 V0 H48 V10 H56 V0 H64 V10 H72 V0 H80 V10 H88 V0 H100"/>
    </svg>
  </div>
  <div class="catalog-controls">
    <div class="view-toggle" id="view-toggle">
      <button type="button" data-view="list" class="active">列表</button>
      <button type="button" data-view="tree">树状图</button>
    </div>
    <button class="random-btn" id="random-btn" type="button">随机阅读 →</button>
  </div>
  <div class="search-box">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="搜索标题、正文关键字或作者…">
  </div>
  <div class="search-hint" id="search-hint"></div>
  <div class="catalog-list" id="catalog-list">
    <div class="empty-state">加载中…</div>
  </div>
</div>
<footer>© 2026 · 诗歌漂流</footer>
<div class="side-theme" id="theme-side">
  <button class="theme-btn" data-theme="light" aria-label="日间模式">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  </button>
  <div class="line"></div>
  <button class="theme-btn" data-theme="dark" aria-label="夜间模式">
    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0 0 20 10 10 0 0 0 0-20z" style="fill:rgba(0,0,0,0.1);"/><path d="M12 2a10 10 0 0 1 0 20 10 10 0 0 1 0-20z" style="fill:rgba(0,0,0,0.1);"/><path d="M12 4a8 8 0 0 0 0 16 8 8 0 0 0 0-16z" fill="var(--charcoal)" opacity="0.2"/><path d="M12 6a6 6 0 0 1 0 12 6 6 0 0 1 0-12z" fill="var(--charcoal)" opacity="0.4"/><path d="M12 8a4 4 0 0 0 0 8 4 4 0 0 0 0-8z" fill="var(--charcoal)" opacity="0.6"/></svg>
  </button>
  <div class="line"></div>
  <button class="theme-btn" data-theme="eye-care" aria-label="护眼模式">
    <svg viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/><path d="M12 9c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z" fill="var(--charcoal)" opacity="0.3"/><path d="M12 10.5c-.8 0-1.5.7-1.5 1.5s.7 1.5 1.5 1.5 1.5-.7 1.5-1.5-.7-1.5-1.5-1.5z" fill="var(--charcoal)" opacity="0.5"/></svg>
  </button>
</div>
<script>
function escapeHtml(s){
  var d = document.createElement('div');
  d.textContent = String(s == null ? '' : s);
  return d.innerHTML;
}
var allPoems = [];
var listEl = document.getElementById('catalog-list');
var hintEl = document.getElementById('search-hint');
function rowHtml(p){
  return '<a class="catalog-row" href="poem.html?id=' + encodeURIComponent(p.id) + '">' +
      '<span class="c-date">' + escapeHtml(p.date) + (p.author ? '<br><span class="c-author">' + escapeHtml(p.author) + '</span>' : '') + '</span>' +
      '<h3>' + escapeHtml(p.title) + '</h3>' +
      '<span class="c-arrow">阅读 →</span>' +
    '</a>';
}
function renderCatalog(poems){
  if(!poems || poems.length === 0){
    listEl.innerHTML = '<div class="empty-state">没有匹配的诗。</div>';
    return;
  }
  poems = poems.slice().sort(function(a,b){ return new Date(b.date) - new Date(a.date); });
  var groups = {};
  var order = [];
  poems.forEach(function(p){
    var s = p.series || '未分类';
    if(!groups[s]){ groups[s] = []; order.push(s); }
    groups[s].push(p);
  });
  listEl.innerHTML = order.map(function(series){
    var list = groups[series];
    var rows;
    if(list.some(function(p){ return p.subseries; })){
      // 有子分类：未填子分类的排在前面，其余按子分类分组（子分类为可选字段）
      rows = list.filter(function(p){ return !p.subseries; }).map(rowHtml).join('');
      var subGroups = {};
      var subOrder = [];
      list.forEach(function(p){
        if(!p.subseries) return;
        if(!subGroups[p.subseries]){ subGroups[p.subseries] = []; subOrder.push(p.subseries); }
        subGroups[p.subseries].push(p);
      });
      rows += subOrder.map(function(sub){
        return '<div class="subseries-head">' + escapeHtml(sub) + '</div>' +
               subGroups[sub].map(rowHtml).join('');
      }).join('');
    } else {
      rows = list.map(rowHtml).join('');
    }
    return '<div class="series-block"><h2>' + escapeHtml(series) + '</h2>' + rows + '</div>';
  }).join('');
}

/* ---------- 树状图模式 ---------- */
var viewMode = localStorage.getItem('catalog_view') === 'tree' ? 'tree' : 'list';
var collapsed = {};
try{ collapsed = JSON.parse(localStorage.getItem('catalog_collapsed') || '{}'); }catch(e){ collapsed = {}; }
function leafHtml(p){
  return '<a class="tree-leaf" href="poem.html?id=' + encodeURIComponent(p.id) + '">' +
      '<span class="leaf-title">' + escapeHtml(p.title) + '</span>' +
      '<span class="leaf-meta">' + escapeHtml(p.date) + (p.author ? ' · ' + escapeHtml(p.author) : '') + '</span>' +
    '</a>';
}
function renderTree(poems){
  if(!poems || poems.length === 0){
    listEl.innerHTML = '<div class="empty-state">没有匹配的诗。</div>';
    return;
  }
  poems = poems.slice().sort(function(a,b){ return new Date(b.date) - new Date(a.date); });
  var groups = {};
  var order = [];
  poems.forEach(function(p){
    var s = p.series || '未分类';
    if(!groups[s]){ groups[s] = []; order.push(s); }
    groups[s].push(p);
  });
  listEl.innerHTML = order.map(function(series){
    var list = groups[series];
    var inner = list.filter(function(p){ return !p.subseries; }).map(leafHtml).join('');
    var subGroups = {};
    var subOrder = [];
    list.forEach(function(p){
      if(!p.subseries) return;
      if(!subGroups[p.subseries]){ subGroups[p.subseries] = []; subOrder.push(p.subseries); }
      subGroups[p.subseries].push(p);
    });
    inner += subOrder.map(function(sub){
      var subKey = series + '/' + sub;
      return '<div class="tree-branch sub' + (collapsed[subKey] ? ' collapsed' : '') + '" data-key="' + escapeHtml(subKey) + '">' +
          '<button class="branch-head" type="button"><span class="tri">▼</span>' + escapeHtml(sub) +
            '<span class="branch-count">' + subGroups[sub].length + '</span></button>' +
          '<div class="branch-children">' + subGroups[sub].map(leafHtml).join('') + '</div>' +
        '</div>';
    }).join('');
    return '<div class="tree-branch' + (collapsed[series] ? ' collapsed' : '') + '" data-key="' + escapeHtml(series) + '">' +
        '<button class="branch-head" type="button"><span class="tri">▼</span>' + escapeHtml(series) +
          '<span class="branch-count">' + list.length + '</span></button>' +
        '<div class="branch-children">' + inner + '</div>' +
      '</div>';
  }).join('');
}
function render(poems){
  if(viewMode === 'tree'){ renderTree(poems); } else { renderCatalog(poems); }
}
// 分支折叠/展开（状态持久化）
listEl.addEventListener('click', function(e){
  var head = e.target.closest('.branch-head');
  if(!head) return;
  var branch = head.parentElement;
  var key = branch.getAttribute('data-key');
  branch.classList.toggle('collapsed');
  if(branch.classList.contains('collapsed')){ collapsed[key] = true; } else { delete collapsed[key]; }
  localStorage.setItem('catalog_collapsed', JSON.stringify(collapsed));
});
// 列表 / 树状图 切换
(function(){
  var toggleBtns = document.querySelectorAll('#view-toggle button');
  toggleBtns.forEach(function(btn){
    btn.classList.toggle('active', btn.getAttribute('data-view') === viewMode);
    btn.addEventListener('click', function(){
      viewMode = this.getAttribute('data-view');
      localStorage.setItem('catalog_view', viewMode);
      toggleBtns.forEach(function(b){ b.classList.toggle('active', b === btn); });
      render(allPoems);
    });
  });
})();
// 随机阅读
document.getElementById('random-btn').addEventListener('click', function(){
  if(!allPoems.length) return;
  var pick = allPoems[Math.floor(Math.random() * allPoems.length)];
  window.location.href = 'poem.html?id=' + encodeURIComponent(pick.id);
});
function doSearch(query){
  query = query.trim().toLowerCase();
  if(!query){
    hintEl.textContent = '';
    render(allPoems);
    return;
  }
  var matched = allPoems.filter(function(p){
    return (p.title || '').toLowerCase().indexOf(query) !== -1 ||
           (p.content || '').toLowerCase().indexOf(query) !== -1 ||
           (p.author || '').toLowerCase().indexOf(query) !== -1 ||
           (p.subseries || '').toLowerCase().indexOf(query) !== -1;
  });
  hintEl.textContent = '找到 ' + matched.length + ' 首';
  render(matched);
}
document.getElementById('search-input').addEventListener('input', function(e){
  doSearch(e.target.value);
});
fetch('poems/poems.json?t=' + Date.now())
  .then(function(r){ return r.json(); })
  .then(function(poems){
    allPoems = poems || [];
    if(allPoems.length === 0){
      listEl.innerHTML = '<div class="empty-state">暂时还没有诗，敬请期待。</div>';
      return;
    }
    render(allPoems);
  })
  .catch(function(){
    listEl.innerHTML = '<div class="empty-state">目录加载失败，检查 poems/poems.json 是否存在。</div>';
  });
(function(){
  var btns = document.querySelectorAll('#theme-side .theme-btn');
  if(!btns.length) return;
  function isNightTime() {
    var hour = new Date().getHours();
    return (hour >= 19 || hour < 6);
  }
  function applyTheme(theme) {
    if (theme === 'light') {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', theme);
    }
    localStorage.setItem('theme', theme);
    btns.forEach(function(btn){
      btn.classList.toggle('active', btn.getAttribute('data-theme') === theme);
    });
  }
  var saved = localStorage.getItem('theme');
  var initial;
  if (saved && (saved === 'light' || saved === 'dark' || saved === 'eye-care')) {
    initial = saved;
  } else {
    initial = isNightTime() ? 'dark' : 'light';
  }
  applyTheme(initial);
  btns.forEach(function(btn){
    btn.addEventListener('click', function(){
      applyTheme(this.getAttribute('data-theme'));
    });
  });
})();
</script>
</body>
</html>
