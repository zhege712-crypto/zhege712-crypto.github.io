<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品 / 伞</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1c1c1b; --charcoal:#373735; --steel:#74736f; --fog:#b9b7b0;
  --paper:#eceae5; --paper-2:#e0ddd6; --white:#faf9f6;
  --accent-red:#e0393e; --accent-cobalt:#2f5fa8; --accent-gold:#e8a33d;
  --font-display:'Fraunces',serif; --font-body:'Inter',sans-serif; --font-mono:'Space Mono',monospace;
  --maxw:1100px;
}
[data-theme="dark"] {
  --ink: #ecece5;
  --charcoal: #c4c4be;
  --steel: #8a8a85;
  --fog: #4a4a45;
  --paper: #1a1a19;
  --paper-2: #2a2a27;
  --white: #222221;
  --accent-red: #e55a5f;
  --accent-gold: #d4a373;
}
[data-theme="eye-care"] {
  --paper: #f5efe0;
  --paper-2: #ede5d0;
  --white: #faf5e8;
  --ink: #4a3f35;
  --charcoal: #6b5f52;
  --steel: #9a8b7a;
  --fog: #d5c8b8;
  --accent-red: #c46a52;
  --accent-gold: #c9a87a;
}
*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{ background:var(--paper); color:var(--ink); font-family:var(--font-body); line-height:1.6; overflow-x:hidden; transition: background 0.3s ease, color 0.3s ease; }
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
.wrap{ max-width:var(--maxw); margin:0 auto; padding:0 32px; }
header{ position:fixed; top:0; left:0; right:0; z-index:100; padding:22px 0; mix-blend-mode:difference; }
header .wrap{ display:flex; justify-content:space-between; align-items:center; }
.logo{ font-family:var(--font-display); font-weight:600; font-size:1.1rem; color:var(--white); }
nav.top-nav ul{ list-style:none; display:flex; gap:28px; }
nav.top-nav a{ font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--white); position:relative; padding-bottom:2px; }
nav.top-nav a::after{ content:''; position:absolute; left:0; bottom:0; width:0; height:1px; background:var(--white); transition:width 0.3s ease; }
nav.top-nav a:hover::after{ width:100%; }
@media (max-width:640px){ nav.top-nav ul{ gap:16px; } }
.side-nav{
  position:fixed; left:24px; top:120px; z-index:150; width:168px;
  background:rgba(250,249,246,0.55); backdrop-filter:blur(16px) saturate(180%); -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid rgba(255,255,255,0.6); border-radius:6px; padding:10px;
  box-shadow:0 10px 34px rgba(28,28,27,0.10), inset 0 1px 0 rgba(255,255,255,0.5);
  transition: background 0.3s ease, border-color 0.3s ease;
}
.side-nav a{ display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:2px; font-family:var(--font-body); font-size:0.88rem; color:var(--charcoal); transition:background 0.25s ease, color 0.25s ease; }
.side-nav a:hover{ background:var(--paper-2); }
.side-nav a.active{ background:var(--paper-2); color:var(--ink); font-weight:600; }
.side-nav a svg{ width:17px; height:17px; flex-shrink:0; stroke:currentColor; fill:none; stroke-width:1.6; }
.side-nav a .badge{ margin-left:auto; font-family:var(--font-mono); font-size:0.65rem; background:var(--paper); color:var(--steel); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; }
.side-nav a.active .badge{ background:var(--accent-gold); color:var(--white); }
@media (max-width:1180px){ .side-nav{ display:none; } }

.side-theme{
  position:fixed; left:24px; bottom:100px; z-index:150;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  background:rgba(255,255,255,0.4); backdrop-filter:blur(12px);
  padding:10px 8px; border-radius:28px; border:1px solid var(--fog);
  transition: background 0.3s ease, border-color 0.3s ease;
}
.side-theme .theme-btn{
  width:34px; height:34px; border-radius:50%; border:none;
  background:transparent; cursor:pointer;
  transition:background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
  display:flex; align-items:center; justify-content:center;
  padding:0; position:relative;
}
.side-theme .theme-btn svg{
  width:22px; height:22px; stroke:var(--charcoal); stroke-width:1.8;
  fill:none; display:block;
  transition: stroke 0.25s ease;
}
.side-theme .theme-btn:hover{ background:var(--paper-2); transform:scale(1.08); }
.side-theme .theme-btn.active{
  background:var(--accent-gold);
  box-shadow:0 0 0 2px var(--accent-gold);
}
.side-theme .theme-btn.active svg{ stroke:var(--white); }
.side-theme .line{
  width:2px; height:10px; background:var(--fog); border-radius:1px;
  transition: background 0.3s ease;
}
@media (max-width:1180px){ .side-theme{ display:none; } }

.page-head{ padding:150px 0 60px; }
.section-num{ font-family:var(--font-mono); font-size:0.75rem; color:var(--accent-red); letter-spacing:0.1em; margin-bottom:10px; display:block; }
.page-head h1{ font-family:var(--font-display); font-weight:500; font-size:clamp(2rem,5vw,3.2rem); }
.page-note{ font-family:var(--font-mono); font-size:0.78rem; color:var(--steel); margin-top:16px; }
.category-block{ margin-bottom:70px; }
.category-block h2{ font-family:var(--font-display); font-weight:500; font-size:1.4rem; margin-bottom:20px; padding-bottom:10px; border-bottom:1px solid var(--paper-2); }
.gallery{ display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:18px; padding-bottom:20px; }
.gallery-item{ position:relative; overflow:hidden; background:var(--paper-2); cursor:pointer; aspect-ratio:4/3; }
.gallery-item img{ width:100%; height:100%; object-fit:cover; filter:grayscale(1) contrast(1.05); transform:scale(1.02); transition:filter 0.6s ease, transform 0.6s ease; }
.gallery-item:hover img{ filter:grayscale(0) contrast(1); transform:scale(1.08); }
.gallery-caption{ position:absolute; left:0; right:0; bottom:0; padding:16px; background:linear-gradient(to top, rgba(28,28,27,0.75), transparent); color:var(--white); opacity:0; transform:translateY(8px); transition:opacity 0.4s ease, transform 0.4s ease; }
.gallery-item:hover .gallery-caption{ opacity:1; transform:translateY(0); }
.gallery-caption .cap-title{ font-family:var(--font-display); font-size:1.05rem; }
.gallery-caption .cap-meta{ font-family:var(--font-mono); font-size:0.68rem; color:var(--fog); margin-top:4px; letter-spacing:0.05em; }
.gallery-wrap{ padding-bottom:140px; }
.empty-state{ text-align:center; color:var(--steel); font-family:var(--font-mono); font-size:0.85rem; padding:40px 0; }
footer{ padding:30px 0; text-align:center; font-family:var(--font-mono); font-size:0.68rem; color:var(--steel); background:var(--ink); }
.gallery-item img{ cursor:zoom-in; }
.lightbox{
  position:fixed; inset:0; z-index:500; background:rgba(28,28,27,0.94);
  display:none; align-items:center; justify-content:center; padding:50px;
  cursor:zoom-out;
}
.lightbox.active{ display:flex; }
.lightbox img{ max-width:100%; max-height:100%; object-fit:contain; filter:none; }
.lightbox-close{
  position:fixed; top:26px; right:32px; z-index:501;
  font-family:var(--font-mono); font-size:0.75rem; color:var(--white);
  border:1px solid rgba(255,255,255,0.3); padding:8px 14px; cursor:pointer;
  background:transparent;
}
.lightbox-close:hover{ border-color:var(--accent-gold); color:var(--accent-gold); }
</style>
</head>
<body>

<nav class="side-nav">
  <a href="index.html">
    <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    首页
  </a>
  <a href="work.html" class="active">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    作品
  </a>
  <a href="video.html">
    <svg viewBox="0 0 24 24"><rect x="3" y="5" width="14" height="14" rx="1"/><path d="M17 9l4-2v10l-4-2z"/></svg>

  <a href="about.html">

  <a href="poems.html">

<div class="side-theme" id="theme-side">
  <button class="theme-btn" data-theme="light" aria-label="日间模式">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  </button>
  <div class="line"></div>
  <button class="theme-btn" data-theme="dark" aria-label="夜间模式">
    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0 0 20 10 10 0 0 0 0-20z" style="fill:rgba(0,0,0,0.1);"/><path d="M12 2a10 10 0 0 1 0 20 10 10 0 0 1 0-20z" style="fill:rgba(0,0,0,0.1);"/><path d="M12 4a8 8 0 0 0 0 16 8 8 0 0 0 0-16z" fill="var(--charcoal)" opacity="0.2"/><path d="M12 6a6 6 0 0 1 0 12 6 6 0 0 1 0-12z" fill="var(--charcoal)" opacity="0.4"/><path d="M12 8a4 4 0 0 0 0 8 4 4 0 0 0 0-8z" fill="var(--charcoal)" opacity="0.6"/></svg>
  </button>
  <div class="line"></div>
  <button class="theme-btn" data-theme="eye-care" aria-label="护眼模式">
    <svg viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/><path d="M12 9c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z" fill="var(--charcoal)" opacity="0.3"/><path d="M12 10.5c-.8 0-1.5.7-1.5 1.5s.7 1.5 1.5 1.5 1.5-.7 1.5-1.5-.7-1.5-1.5-1.5z" fill="var(--charcoal)" opacity="0.5"/></svg>
  </button>
</div>
<div class="wrap">
  <div class="page-head">
    <span class="section-num">01 — 精选作品</span>
    <h1>照片</h1>
    <p class="page-note">鼠标悬停查看彩色版本 —— 灰色是常态，颜色是发现</p>
  </div>
  <div class="gallery-wrap" id="gallery-wrap">
    <div class="empty-state">加载中…</div>
  </div>
</div>
<footer>© 2026 水告示阳 · 保留所有权利</footer>
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" type="button">关闭 ✕</button>
  <img id="lightbox-img" src="" alt="">
</div>
<script>
(function(){
  var wrap = document.getElementById('gallery-wrap');
  function escapeHtml(s){
    var d = document.createElement('div');
    d.textContent = String(s == null ? '' : s);
    return d.innerHTML;
  }
  fetch('photos/photos.json?t=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(photos){
      if(!photos || photos.length === 0){
        wrap.innerHTML = '<div class="empty-state">还没有照片</div>';
        return;
      }
      var groups = {};
      photos.forEach(function(p){
        var cat = p.category || '未分类';
        if(!groups[cat]) groups[cat] = [];
        groups[cat].push(p);
      });
      wrap.innerHTML = Object.keys(groups).map(function(cat){
        var items = groups[cat].map(function(p){
          return '<div class="gallery-item"><img src="' + escapeHtml(p.image) + '" alt="' + escapeHtml(p.title) + '"><div class="gallery-caption"><div class="cap-title">' + escapeHtml(p.title) + '</div><div class="cap-meta">' + escapeHtml(p.date) + '</div></div></div>';
        }).join('');
        return '<div class="category-block"><h2>' + escapeHtml(cat) + '</h2><div class="gallery">' + items + '</div></div>';
      }).join('');
    })
    .catch(function(){
      wrap.innerHTML = '<div class="empty-state">照片加载失败，检查 photos/photos.json 是否存在。</div>';
    });
})();
(function(){
  var lightbox = document.getElementById('lightbox');
  var lightboxImg = document.getElementById('lightbox-img');
  function openLightbox(src, alt){
    lightboxImg.src = src;
    lightboxImg.alt = alt || '';
    lightbox.classList.add('active');
  }
  function closeLightbox(){
    lightbox.classList.remove('active');
    lightboxImg.src = '';
  }
  document.addEventListener('click', function(e){
    var img = e.target.closest('.gallery-item img');
    if(img){ openLightbox(img.src, img.alt); return; }
    if(lightbox.classList.contains('active') && lightbox.contains(e.target)){
      closeLightbox();
    }
  });
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape') closeLightbox();
  });
})();
(function(){
  var badge = document.getElementById('poem-count');
  if(!badge) return;
  fetch('poems/poems.json?t=' + Date.now()).then(function(r){ return r.json(); }).then(function(list){
    badge.textContent = list.length;
  }).catch(function(){ badge.textContent = '0'; });
})();
(function(){
  var btns = document.querySelectorAll('#theme-side .theme-btn');
  if(!btns.length) return;
  function isNightTime() {
    var hour = new Date().getHours();
    return (hour >= 19 || hour < 6);
  }
  function applyTheme(theme) {
    if (theme === 'light') {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', theme);
    }
    localStorage.setItem('theme', theme);
    btns.forEach(function(btn){
      btn.classList.toggle('active', btn.getAttribute('data-theme') === theme);
    });
  }
  var saved = localStorage.getItem('theme');
  var initial;
  if (saved && (saved === 'light' || saved === 'dark' || saved === 'eye-care')) {
    initial = saved;
  } else {
    initial = isNightTime() ? 'dark' : 'light';
  }
  applyTheme(initial);
  btns.forEach(function(btn){
    btn.addEventListener('click', function(){
      applyTheme(this.getAttribute('data-theme'));
    });
  });
})();
</script>
</body>
