<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诗歌漂流 / Poem's Yesterday</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:      #1c1c1b;
  --charcoal: #373735;
  --steel:    #74736f;
  --fog:      #b9b7b0;
  --paper:    #eceae5;
  --paper-2:  #e0ddd6;
  --white:    #faf9f6;
  --accent-red:    #e0393e;
  --accent-cobalt: #2f5fa8;
  --accent-gold:   #e8a33d;
  --font-display: 'Fraunces', serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --maxw: 780px;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--paper); color:var(--ink); font-family:var(--font-body); line-height:1.7; }
a{ color:inherit; text-decoration:none; }
.wrap{ max-width:var(--maxw); margin:0 auto; padding:0 28px; }

header{ padding:26px 0; border-bottom:1px solid var(--paper-2); }
header .wrap{ max-width:960px; display:flex; justify-content:space-between; align-items:center; }
.logo{ font-family:var(--font-display); font-weight:600; }
.back-link{ font-family:var(--font-mono); font-size:0.75rem; color:var(--steel); }
.back-link:hover{ color:var(--accent-red); }

.page-head{ padding:70px 0 40px; text-align:center; }
.page-head .eyebrow{
  font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.2em;
  color:var(--accent-red); text-transform:uppercase; margin-bottom:14px;
}
.page-head h1{ font-family:var(--font-display); font-weight:500; font-size:clamp(2rem,6vw,3rem); }
.page-head p{ color:var(--steel); margin-top:12px; font-size:0.95rem; }

.poem-list{ padding-bottom:100px; display:flex; flex-direction:column; gap:70px; }
.poem-card{ border-top:1px solid var(--paper-2); padding-top:40px; }
.poem-meta{ font-family:var(--font-mono); font-size:0.72rem; color:var(--steel); margin-bottom:14px; }
.poem-title{ font-family:var(--font-display); font-weight:500; font-size:1.7rem; margin-bottom:22px; }
.poem-content{ white-space:pre-line; font-size:1.02rem; color:var(--charcoal); }
.poem-image{ margin-top:26px; }
.poem-image img{ width:100%; filter:grayscale(1); transition:filter 0.6s ease; }
.poem-image img:hover{ filter:grayscale(0); }

.empty-state{ text-align:center; color:var(--steel); font-family:var(--font-mono); font-size:0.85rem; padding:60px 0; }

.comments-section{ padding:40px 0 100px; border-top:1px solid var(--paper-2); }
.comments-section h2{ font-family:var(--font-display); font-weight:500; font-size:1.3rem; margin-bottom:26px; }

footer{ padding:30px 0; text-align:center; font-family:var(--font-mono); font-size:0.68rem; color:var(--steel); background:var(--ink); }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="logo">诗歌漂流</div>
    <a class="back-link" href="index.html">← 返回主页</a>
  </div>
</header>

<div class="page-head">
  <div class="wrap">
    <div class="eyebrow">Poem's Yesterday</div>
    <h1>诗歌漂流</h1>
    <p>文字被放进瓶子，漂到读到它的人手上。</p>
  </div>
</div>

<div class="wrap">
  <div class="poem-list" id="poem-list">
    <div class="empty-state">加载中…</div>
  </div>
</div>

<div class="wrap comments-section">
  <h2>留言</h2>
  <!-- ⚠️ giscus 留言组件：需要按下方教程替换成你自己的仓库参数 -->
  <script src="https://giscus.app/client.js"
    data-repo="zhege712-crypto/zhege712-crypto.github.io"
    data-repo-id="R_kgDOTWw-Ew"
    data-category="Announcements"
    data-category-id="DIC_kwDOTWw-E84DBOn-"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="bottom"
    data-theme="light"
    data-lang="zh-CN"
    crossorigin="anonymous"
    async>
  </script>
</div>

<footer>© 2026 · 诗歌漂流</footer>

<script>
fetch('poems/poems.json')
  .then(function(r){ return r.json(); })
  .then(function(poems){
    var list = document.getElementById('poem-list');
    if(!poems || poems.length === 0){
      list.innerHTML = '<div class="empty-state">暂时还没有诗，敬请期待。</div>';
      return;
    }
    // 新的排在前面
    poems.sort(function(a,b){ return new Date(b.date) - new Date(a.date); });
    list.innerHTML = poems.map(function(p){
      var img = p.image ? '<div class="poem-image"><img src="'+ p.image +'" alt="'+ p.title +'"></div>' : '';
      return '' +
        '<div class="poem-card">' +
          '<div class="poem-meta">' + p.date + '</div>' +
          '<div class="poem-title">' + p.title + '</div>' +
          '<div class="poem-content">' + p.content + '</div>' +
          img +
        '</div>';
    }).join('');
  })
  .catch(function(){
    document.getElementById('poem-list').innerHTML = '<div class="empty-state">诗歌数据加载失败，检查 poems/poems.json 是否存在。</div>';
  });
</script>

</body>
</html>
