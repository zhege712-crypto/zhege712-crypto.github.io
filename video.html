<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频 / 伞</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>

:root{
  --ink:#1c1c1b; --charcoal:#373735; --steel:#74736f; --fog:#b9b7b0;
  --paper:#eceae5; --paper-2:#e0ddd6; --white:#faf9f6;
  --accent-red:#e0393e; --accent-cobalt:#2f5fa8; --accent-gold:#e8a33d;
  --font-display:'Fraunces',serif; --font-body:'Inter',sans-serif; --font-mono:'Space Mono',monospace;
  --maxw:1100px;
}
*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{ background:var(--paper); color:var(--ink); font-family:var(--font-body); line-height:1.6; overflow-x:hidden; }
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
.wrap{ max-width:var(--maxw); margin:0 auto; padding:0 32px; }

header{ position:fixed; top:0; left:0; right:0; z-index:100; padding:22px 0; mix-blend-mode:difference; }
header .wrap{ display:flex; justify-content:space-between; align-items:center; }
.logo{ font-family:var(--font-display); font-weight:600; font-size:1.1rem; color:var(--white); }
nav.top-nav ul{ list-style:none; display:flex; gap:28px; }
nav.top-nav a{ font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--white); position:relative; padding-bottom:2px; }
nav.top-nav a::after{ content:''; position:absolute; left:0; bottom:0; width:0; height:1px; background:var(--white); transition:width 0.3s ease; }
nav.top-nav a:hover::after{ width:100%; }
@media (max-width:640px){ nav.top-nav ul{ gap:16px; } }

.side-nav{ position:fixed; left:24px; top:120px; z-index:150; width:168px; background:var(--white); border:1px solid var(--paper-2); padding:10px; box-shadow:0 10px 30px rgba(28,28,27,0.06); }
.side-nav a{ display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:2px; font-family:var(--font-body); font-size:0.88rem; color:var(--charcoal); transition:background 0.25s ease, color 0.25s ease; }
.side-nav a:hover{ background:var(--paper-2); }
.side-nav a.active{ background:var(--paper-2); color:var(--ink); font-weight:600; }
.side-nav a svg{ width:17px; height:17px; flex-shrink:0; stroke:currentColor; fill:none; stroke-width:1.6; }
.side-nav a .badge{ margin-left:auto; font-family:var(--font-mono); font-size:0.65rem; background:var(--paper); color:var(--steel); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; }
.side-nav a.active .badge{ background:var(--accent-gold); color:var(--white); }
@media (max-width:1180px){ .side-nav{ display:none; } }

.page-head{ padding:150px 0 60px; }
.section-num{ font-family:var(--font-mono); font-size:0.75rem; color:var(--accent-red); letter-spacing:0.1em; margin-bottom:10px; display:block; }
.page-head h1{ font-family:var(--font-display); font-weight:500; font-size:clamp(2rem,5vw,3.2rem); }
.page-note{ font-family:var(--font-mono); font-size:0.78rem; color:var(--steel); margin-top:16px; }

.video-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:24px; padding-bottom:140px; }
.video-embed{ position:relative; aspect-ratio:16/9; overflow:hidden; background:var(--ink); cursor:pointer; }
.video-embed iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }
.embed-caption{ margin-top:14px; }
.embed-caption h3{ font-family:var(--font-display); font-weight:500; font-size:1.1rem; color:var(--ink); }
.embed-caption span{ font-family:var(--font-mono); font-size:0.7rem; color:var(--steel); }
.play-btn{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:56px; height:56px; border-radius:50%; border:1px solid rgba(255,255,255,0.5); display:flex; align-items:center; justify-content:center; transition:transform 0.3s ease, background 0.3s ease; }
.video-embed:hover .play-btn{ transform:translate(-50%,-50%) scale(1.1); background:rgba(255,255,255,0.1); }
.play-btn svg{ width:16px; height:16px; fill:var(--white); margin-left:2px; }
@media (max-width:820px){ .video-grid{ grid-template-columns:1fr; } }

footer{ padding:30px 0; text-align:center; font-family:var(--font-mono); font-size:0.68rem; color:var(--steel); background:var(--ink); }


</style>
</head>
<body>

<header>
  <div class="wrap">
    <a class="logo" href="index.html">伞 umbrella</a>
    <nav class="top-nav">
      <ul>
        <li><a href="work.html">作品</a></li>
        <li><a href="video.html">视频</a></li>
        <li><a href="writing.html">文章</a></li>
        <li><a href="about.html">关于</a></li>
      </ul>
    </nav>
  </div>
</header>

<nav class="side-nav">
  <a href="index.html">
    <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    首页
  </a>
  <a href="work.html">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    作品
  </a>
  <a href="video.html" class="active">
    <svg viewBox="0 0 24 24"><rect x="3" y="5" width="14" height="14" rx="1"/><path d="M17 9l4-2v10l-4-2z"/></svg>
    视频
  </a>
  <a href="writing.html">
    <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h5"/></svg>
    文章
  </a>
  <a href="about.html">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>
    关于
  </a>
  <a href="poems.html">
    <svg viewBox="0 0 24 24"><path d="M20 4L9 15l-5 1 1-5L16 0z"/><path d="M3 21h18"/></svg>
    诗歌漂流
    <span class="badge" id="poem-count">·</span>
  </a>
</nav>

<div class="wrap">
  <div class="page-head">
    <span class="section-num">02 — 影像</span>
    <h1>视频</h1>
    <p class="page-note">点击封面才加载播放器，不会自动播放</p>
  </div>

  <div class="video-grid">
    <div>
      <div class="video-embed" data-bvid="BV1KGphe1EMa">
        <div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      </div>
      <div class="embed-caption">
        <h3>EDU YAMERO</h3>
        <span>2024</span>
      </div>
    </div>

    <div>
      <div class="video-embed" data-bvid="BV148411o7An">
        <div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      </div>
      <div class="embed-caption">
        <h3>我推的天一</h3>
        <span>2023</span>
      </div>
    </div>
  </div>
</div>

<footer>© 2026 水告示阳 · 保留所有权利</footer>


<script>
(function(){
  var badge = document.getElementById('poem-count');
  if(!badge) return;
  fetch('poems/poems.json?t=' + Date.now()).then(function(r){ return r.json(); }).then(function(list){
    badge.textContent = list.length;
  }).catch(function(){ badge.textContent = '0'; });
})();

document.querySelectorAll('.video-embed').forEach(function(box){
  box.addEventListener('click', function(){
    var bvid = box.getAttribute('data-bvid');
    var iframe = document.createElement('iframe');
    iframe.src = 'https://player.bilibili.com/player.html?bvid=' + bvid + '&page=1&high_quality=1&danmaku=0&autoplay=1';
    iframe.scrolling = 'no';
    iframe.allowFullscreen = true;
    iframe.style.border = '0';
    box.innerHTML = '';
    box.style.cursor = 'default';
    box.appendChild(iframe);
  }, { once:true });
});

</script>

</body>
</html>
