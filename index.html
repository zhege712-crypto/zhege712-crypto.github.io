<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伞 / 视觉作品集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:      #1c1c1b;
  --charcoal: #373735;
  --steel:    #74736f;
  --fog:      #b9b7b0;
  --paper:    #eceae5;
  --paper-2:  #e0ddd6;
  --white:    #faf9f6;
  --accent-red:    #e0393e;
  --accent-cobalt: #2f5fa8;
  --accent-gold:   #e8a33d;
  --font-display: 'Fraunces', serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --maxw: 1100px;
}

[data-theme="dark"] {
  --ink: #ecece5;
  --charcoal: #c4c4be;
  --steel: #8a8a85;
  --fog: #4a4a45;
  --paper: #1a1a19;
  --paper-2: #2a2a27;
  --white: #222221;
  --accent-red: #e55a5f;
  --accent-gold: #d4a373;
}
[data-theme="eye-care"] {
  --paper: #f5efe0;
  --paper-2: #ede5d0;
  --white: #faf5e8;
  --ink: #4a3f35;
  --charcoal: #6b5f52;
  --steel: #9a8b7a;
  --fog: #d5c8b8;
  --accent-red: #c46a52;
  --accent-gold: #c9a87a;
}

*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{ background:var(--paper); color:var(--ink); font-family:var(--font-body); line-height:1.6; overflow-x:hidden; transition: background 0.3s ease, color 0.3s ease; }
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
.wrap{ max-width:var(--maxw); margin:0 auto; padding:0 32px; }

/* ---------- 推开门开幕动画 ---------- */
#door-loader {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: #1c1c1b;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.8s ease, visibility 0.8s ease;
  opacity: 1;
  visibility: visible;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
#door-loader.closing {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
#door-loader.skip {
  display: none;
}

.door-scene {
  perspective: 1400px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  pointer-events: none;
}
.door-scene .door-frame {
  pointer-events: auto;
}

.door-frame {
  position: relative;
  width: 340px;
  height: 420px;
  border: 4px solid #1c1c1b;
  background: #1c1c1b;
  border-radius: 2px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  transform-style: preserve-3d;
  cursor: grab;
}
.door-frame:active { cursor: grabbing; }

.meander-wrap {
  position: absolute;
  top: -24px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% + 16px);
  height: 20px;
  background: #1c1c1b;
  border-radius: 2px 2px 0 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
  pointer-events: none;
}
.meander-wrap svg {
  width: 100%;
  height: 14px;
  stroke: #f5f0e8;
  stroke-width: 1.8;
  fill: none;
}

.door-panel-wrap {
  position: absolute;
  top: 4px;
  bottom: 4px;
  width: calc(50% - 2px);
  transform-style: preserve-3d;
  backface-visibility: hidden;
  transition: filter 0.3s ease;
}
.door-left-wrap {
  left: 4px;
  transform-origin: left center;
  cursor: ew-resize;
}
.door-right-wrap {
  right: 4px;
  transform-origin: right center;
  cursor: ew-resize;
}

.door-panel {
  width: 100%;
  height: 100%;
  background: #f5f0e8;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  position: relative;
  transition: box-shadow 0.3s ease;
}
.door-left-wrap .door-panel { border-radius: 2px 0 0 2px; }
.door-right-wrap .door-panel { border-radius: 0 2px 2px 0; }

.door-panel-wrap.dragging .door-panel {
  box-shadow: inset 0 0 0 2px var(--accent-gold), 0 0 30px rgba(232, 163, 61, 0.15);
}
.door-panel-wrap.dragging { filter: brightness(1.02); }

.door-panel .l-shape {
  position: absolute;
  top: 26%;
  width: 48%;
  height: 48%;
  border: 3px solid #1c1c1b;
  border-right: none;
  border-bottom: none;
  opacity: 0.85;
  transition: border-color 0.3s ease;
}
.door-left-wrap .l-shape { right: 16%; }
.door-right-wrap .l-shape { left: 16%; transform: scaleX(-1); }
.door-panel-wrap.dragging .l-shape { border-color: var(--accent-gold); }

.door-panel .handle {
  position: absolute;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent-gold);
  top: 50%;
  transform: translateY(-50%);
  box-shadow: 0 0 0 3px #1c1c1b, 0 4px 12px rgba(0,0,0,0.3);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.door-left-wrap .handle { right: 14%; }
.door-right-wrap .handle { left: 14%; }
.door-panel-wrap.dragging .handle {
  transform: translateY(-50%) scale(1.15);
  box-shadow: 0 0 0 4px var(--accent-gold), 0 4px 20px rgba(232, 163, 61, 0.4);
}

.door-glow {
  position: absolute;
  top: 10%;
  left: 50%;
  transform: translateX(-50%);
  width: 6px;
  height: 80%;
  background: var(--accent-gold);
  opacity: 0;
  border-radius: 2px;
  filter: blur(3px);
  transition: opacity 0.6s ease;
  pointer-events: none;
}
.door-glow.active { opacity: 0.5; }

.door-hint {
  position: absolute;
  bottom: -38px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(185, 183, 176, 0.5);
  white-space: nowrap;
  transition: opacity 0.8s ease;
  pointer-events: none;
  opacity: 1;
}
.door-hint.hidden { opacity: 0; }

.door-caption {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: #b9b7b0;
  opacity: 0;
  transition: opacity 0.6s ease;
  pointer-events: none;
}
.door-caption.show { opacity: 1; }

.door-timer {
  position: absolute;
  bottom: -52px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
  pointer-events: none;
}
.door-timer .dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(185, 183, 176, 0.2);
  transition: background 0.4s ease;
}
.door-timer .dot.active { background: var(--accent-gold); }

@media (max-width: 640px) {
  .door-frame { width: 240px; height: 300px; }
  .meander-wrap { top: -18px; height: 16px; }
  .meander-wrap svg { height: 10px; }
  .door-panel .l-shape { border-width: 2px; top: 28%; width: 44%; height: 44%; }
  .door-panel .handle { width: 10px; height: 10px; }
  .door-caption { font-size: 0.6rem; }
  .door-hint { font-size: 0.5rem; bottom: -32px; }
  .door-timer { bottom: -44px; }
}

/* ============================================================
   飞鸟 + 文字显现 + 飘落物动画（开门后触发）
   ============================================================ */

/* 飞鸟容器 */
.bird-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 50;
  overflow: visible;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.bird-container.active {
  opacity: 1;
}

/* 飞鸟 SVG */
.bird-svg {
  position: absolute;
  width: 80px;
  height: 50px;
  top: 22%;
  right: -20%;
  opacity: 0;
  transform: translate(0, 0) scale(0.8);
  transition: none;
}
.bird-svg .wing {
  transition: transform 0.15s ease;
  transform-origin: center center;
}
.bird-svg .wing-up {
  transform: rotate(-8deg);
}
.bird-svg .wing-down {
  transform: rotate(12deg);
}

/* 飞鸟飞行路径 —— 使用 Web Animations API 或 CSS */
.bird-flying {
  animation: birdFly 4.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}
@keyframes birdFly {
  0% {
    right: -20%;
    top: 22%;
    opacity: 0;
    transform: translate(0, 0) scale(0.8) rotate(2deg);
  }
  8% {
    opacity: 1;
    transform: translate(0, 0) scale(1) rotate(0deg);
  }
  25% {
    right: 55%;
    top: 18%;
    transform: translate(0, -20px) scale(1.05) rotate(-3deg);
  }
  45% {
    right: 70%;
    top: 24%;
    transform: translate(0, 5px) scale(1) rotate(2deg);
  }
  65% {
    right: 85%;
    top: 16%;
    transform: translate(0, -15px) scale(1.02) rotate(-2deg);
  }
  85% {
    right: 105%;
    top: 22%;
    transform: translate(0, 0) scale(1) rotate(0deg);
    opacity: 1;
  }
  100% {
    right: 120%;
    top: 20%;
    transform: translate(0, 0) scale(0.9) rotate(3deg);
    opacity: 0;
  }
}

/* 飞鸟翅膀扇动 */
@keyframes wingFlap {
  0%, 100% { transform: rotate(-12deg); }
  50% { transform: rotate(16deg); }
}
.bird-flying .wing {
  animation: wingFlap 0.25s ease-in-out infinite;
}

/* 标题文字 —— 逐字显现 */
.hero h1 .char {
  display: inline-block;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.hero h1 .char.reveal {
  opacity: 1;
  transform: translateY(0);
}
.hero h1 .char.delay-1 { transition-delay: 0.05s; }
.hero h1 .char.delay-2 { transition-delay: 0.10s; }
.hero h1 .char.delay-3 { transition-delay: 0.15s; }
.hero h1 .char.delay-4 { transition-delay: 0.20s; }
.hero h1 .char.delay-5 { transition-delay: 0.25s; }
.hero h1 .char.delay-6 { transition-delay: 0.30s; }
.hero h1 .char.delay-7 { transition-delay: 0.35s; }
.hero h1 .char.delay-8 { transition-delay: 0.40s; }
.hero h1 .char.delay-9 { transition-delay: 0.45s; }
.hero h1 .char.delay-10 { transition-delay: 0.50s; }
.hero h1 .char.delay-11 { transition-delay: 0.55s; }
.hero h1 .char.delay-12 { transition-delay: 0.60s; }
.hero h1 .char.delay-13 { transition-delay: 0.65s; }
.hero h1 .char.delay-14 { transition-delay: 0.70s; }
.hero h1 .char.delay-15 { transition-delay: 0.75s; }
.hero h1 .char.delay-16 { transition-delay: 0.80s; }
.hero h1 .char.delay-17 { transition-delay: 0.85s; }
.hero h1 .char.delay-18 { transition-delay: 0.90s; }
.hero h1 .char.delay-19 { transition-delay: 0.95s; }
.hero h1 .char.delay-20 { transition-delay: 1.00s; }

/* 飘落物容器 */
.falling-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 40;
  overflow: hidden;
}
.falling-item {
  position: absolute;
  top: -60px;
  opacity: 0.85;
  will-change: transform;
  pointer-events: none;
}
.falling-item svg {
  display: block;
  width: 100%;
  height: 100%;
}

/* 响应式调整 */
@media (max-width: 768px) {
  .bird-svg {
    width: 56px;
    height: 35px;
  }
}

/* ============================================================
   原有样式
   ============================================================ */

header{ position:fixed; top:0; left:0; right:0; z-index:100; padding:22px 0; mix-blend-mode:difference; }
header .wrap{ display:flex; justify-content:space-between; align-items:center; }
.logo{ font-family:var(--font-display); font-weight:600; font-size:1.1rem; color:var(--white); }
nav.top-nav ul{ list-style:none; display:flex; gap:28px; }
nav.top-nav a{ font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--white); position:relative; padding-bottom:2px; }
nav.top-nav a::after{ content:''; position:absolute; left:0; bottom:0; width:0; height:1px; background:var(--white); transition:width 0.3s ease; }
nav.top-nav a:hover::after{ width:100%; }
@media (max-width:640px){ nav.top-nav ul{ gap:16px; } }

.side-nav{
  position:fixed; left:24px; top:120px; z-index:150; width:168px;
  background:rgba(255,255,255,0.6); backdrop-filter:blur(16px) saturate(180%); -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid rgba(255,255,255,0.6); border-radius:6px; padding:10px;
  box-shadow:0 10px 34px rgba(28,28,27,0.10), inset 0 1px 0 rgba(255,255,255,0.5);
  transition: background 0.3s ease, border-color 0.3s ease;
}
.side-nav a{ display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:2px; font-family:var(--font-body); font-size:0.88rem; color:var(--charcoal); transition:background 0.25s ease, color 0.25s ease; }
.side-nav a:hover{ background:var(--paper-2); }
.side-nav a.active{ background:var(--paper-2); color:var(--ink); font-weight:600; }
.side-nav a svg{ width:17px; height:17px; flex-shrink:0; stroke:currentColor; fill:none; stroke-width:1.6; }
.side-nav a .badge{ margin-left:auto; font-family:var(--font-mono); font-size:0.65rem; background:var(--paper); color:var(--steel); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; }
.side-nav a.active .badge{ background:var(--accent-gold); color:var(--white); }
@media (max-width:1180px){ .side-nav{ display:none; } }

.side-theme{
  position:fixed; left:24px; bottom:100px; z-index:150;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  background:rgba(255,255,255,0.4); backdrop-filter:blur(12px);
  padding:10px 8px; border-radius:28px; border:1px solid var(--fog);
  transition: background 0.3s ease, border-color 0.3s ease;
}
.side-theme .theme-btn{
  width:34px; height:34px; border-radius:50%; border:none;
  background:transparent; cursor:pointer;
  transition:background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
  display:flex; align-items:center; justify-content:center;
  padding:0;
}
.side-theme .theme-btn svg{
  width:22px; height:22px; stroke:var(--charcoal); stroke-width:1.8;
  fill:none; display:block;
  transition: stroke 0.25s ease;
}
.side-theme .theme-btn:hover{ background:var(--paper-2); transform:scale(1.08); }
.side-theme .theme-btn.active{
  background:var(--accent-gold);
  box-shadow:0 0 0 2px var(--accent-gold);
}
.side-theme .theme-btn.active svg{ stroke:var(--white); }
.side-theme .line{
  width:2px; height:10px; background:var(--fog); border-radius:1px;
  transition: background 0.3s ease;
}
@media (max-width:1180px){ .side-theme{ display:none; } }

.hero{ min-height:100vh; display:flex; flex-direction:column; justify-content:center; position:relative; padding-top:100px; background:var(--paper); }
.hero-eyebrow{ font-family:var(--font-mono); font-size:0.75rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--steel); margin-bottom:18px; display:flex; align-items:center; gap:10px; }
.hero-eyebrow::before{ content:''; width:22px; height:1px; background:var(--accent-red); }
.hero h1{ font-family:var(--font-display); font-weight:500; font-size:clamp(2.6rem, 7vw, 5.4rem); line-height:1.05; letter-spacing:-0.01em; max-width:820px; }
.hero h1 em{ font-style:italic; font-weight:300; color:var(--steel); }
.hero-desc{ margin-top:26px; max-width:480px; color:var(--charcoal); font-size:1.02rem; }
.hero-olive{ width:34px; height:34px; color:var(--accent-gold); opacity:0.85; margin-bottom:20px; }
.hero-divider{ width:110px; height:11px; color:var(--fog); margin:26px 0 0; display:block; }
.hero-scroll{ position:absolute; bottom:40px; left:32px; font-family:var(--font-mono); font-size:0.7rem; color:var(--steel); display:flex; align-items:center; gap:10px; letter-spacing:0.1em; }
.hero-scroll .line{ width:1px; height:40px; background:var(--fog); position:relative; overflow:hidden; }
.hero-scroll .line::after{ content:''; position:absolute; top:-40px; left:0; width:100%; height:40px; background:var(--accent-red); animation:scrollline 2s ease-in-out infinite; }
@keyframes scrollline{ 50%{ top:40px; } 100%{ top:40px; } }

.entry-grid{ padding:0 0 140px; display:grid; grid-template-columns:repeat(3,1fr); gap:2px; background:var(--paper-2); }
.entry-card{
  background:var(--paper); padding:44px 32px; min-height:220px;
  display:flex; flex-direction:column; justify-content:space-between;
  transition:background 0.35s ease, color 0.35s ease;
}
.entry-card:hover{ background:var(--ink); color:var(--white); }
.entry-num{ font-family:var(--font-mono); font-size:0.7rem; color:var(--accent-red); letter-spacing:0.1em; }
.entry-card h3{ font-family:var(--font-display); font-weight:500; font-size:1.6rem; margin-top:auto; }
.entry-arrow{ font-family:var(--font-mono); font-size:0.75rem; margin-top:14px; color:var(--steel); }
.entry-card:hover .entry-arrow{ color:var(--accent-gold); }
@media (max-width:900px){ .entry-grid{ grid-template-columns:1fr 1fr; } }
@media (max-width:640px){ .entry-grid{ grid-template-columns:1fr; } }

footer{ padding:30px 0; text-align:center; font-family:var(--font-mono); font-size:0.68rem; color:var(--steel); background:var(--ink); }

#music-toggle{ position:fixed; right:28px; bottom:28px; z-index:200; width:56px; height:56px; border-radius:50%; background:var(--ink); border:1px solid var(--charcoal); display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.25); transition:border-color 0.3s ease; }
#music-toggle:hover{ border-color:var(--accent-gold); }
#music-toggle .ring{ position:absolute; inset:-4px; border-radius:50%; border:1px solid var(--accent-gold); opacity:0; transform:scale(0.85); transition:opacity 0.3s ease; }
#music-toggle.playing .ring{ opacity:1; animation: pulse-ring 1.8s ease-out infinite; }
@keyframes pulse-ring{ 0%{ transform:scale(0.85); opacity:0.8; } 100%{ transform:scale(1.35); opacity:0; } }
#music-toggle .bars{ display:flex; align-items:flex-end; gap:3px; height:16px; }
#music-toggle .bars span{ width:3px; background:var(--fog); border-radius:1px; height:6px; transition:background 0.3s ease; }
#music-toggle.playing .bars span{ background:var(--accent-gold); }
#music-toggle.playing .bars span:nth-child(1){ animation:bar1 1.1s ease-in-out infinite; }
#music-toggle.playing .bars span:nth-child(2){ animation:bar2 0.9s ease-in-out infinite; }
#music-toggle.playing .bars span:nth-child(3){ animation:bar3 1.3s ease-in-out infinite; }
@keyframes bar1{ 0%,100%{ height:6px; } 50%{ height:16px; } }
@keyframes bar2{ 0%,100%{ height:10px; } 50%{ height:4px; } }
@keyframes bar3{ 0%,100%{ height:6px; } 50%{ height:14px; } }
#music-toggle .label{ position:absolute; right:66px; top:50%; transform:translateY(-50%); font-family:var(--font-mono); font-size:0.68rem; color:var(--white); background:var(--ink); padding:6px 10px; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
#music-toggle:hover .label{ opacity:1; }
@media (max-width:640px){ #music-toggle{ right:18px; bottom:18px; width:50px; height:50px; } #music-toggle .label{ display:none; } }
</style>
</head>

<script>
// ============================================================
// 1. 开门交互逻辑
// ============================================================
(function(){
  var loader = document.getElementById('door-loader');
  var frame = document.getElementById('door-frame');
  var leftWrap = document.getElementById('door-left');
  var rightWrap = document.getElementById('door-right');
  var glow = document.getElementById('door-glow');
  var caption = document.getElementById('door-caption');
  var hint = document.getElementById('door-hint');
  var dots = document.querySelectorAll('#door-timer .dot');

  if(!loader) return;

  var isOpen = false;
  var isClosing = false;
  var isDragging = false;
  var autoTimer = null;
  var dragTarget = null;
  var startX = 0;
  var MAX_ANGLE = 68;
  var THRESHOLD = 22;

  function setDoorAngle(side, angle) {
    angle = Math.max(0, Math.min(MAX_ANGLE, angle));
    var el = side === 'left' ? leftWrap : rightWrap;
    var rot = side === 'left' ? -angle : angle;
    el.style.transform = 'rotateY(' + rot + 'deg)';
    var intensity = Math.min(0.5, angle / MAX_ANGLE * 0.7);
    glow.style.opacity = intensity;
    if (angle > 5) glow.classList.add('active');
    else glow.classList.remove('active');
    if (angle > MAX_ANGLE * 0.85) {
      caption.classList.add('show');
      hint.classList.add('hidden');
    } else {
      caption.classList.remove('show');
    }
  }

  function getDoorAngle(side) {
    var el = side === 'left' ? leftWrap : rightWrap;
    var transform = el.style.transform || '';
    var match = transform.match(/rotateY\(([\d.-]+)deg\)/);
    if (match) return Math.abs(parseFloat(match[1]));
    return 0;
  }

  function openDoor() {
    if (isOpen) return;
    isOpen = true;
    clearTimeout(autoTimer);
    setDoorAngle('left', MAX_ANGLE);
    setDoorAngle('right', MAX_ANGLE);
    glow.style.opacity = '0.5';
    glow.classList.add('active');
    caption.classList.add('show');
    hint.classList.add('hidden');
    dots.forEach(function(d){ d.classList.remove('active'); });
    setTimeout(function(){
      if (!isClosing) {
        isClosing = true;
        loader.classList.add('closing');
        // 开门结束后触发飞鸟和飘落物
        triggerBirdAndFall();
        setTimeout(function(){ loader.style.display = 'none'; }, 800);
      }
    }, 600);
  }

  function closeDoor() {
    if (isOpen) return;
    setDoorAngle('left', 0);
    setDoorAngle('right', 0);
    glow.style.opacity = '0';
    glow.classList.remove('active');
    caption.classList.remove('show');
    hint.classList.remove('hidden');
  }

  function startAutoTimer() {
    if (isOpen) return;
    var countdown = 0;
    dots.forEach(function(d, i){
      d.classList.remove('active');
      if (i === 0) d.classList.add('active');
    });
    clearTimeout(autoTimer);
    autoTimer = setTimeout(function tick(){
      if (isOpen || isDragging) return;
      countdown++;
      dots.forEach(function(d, i){ d.classList.toggle('active', i <= countdown); });
      if (countdown >= 2) { openDoor(); return; }
      autoTimer = setTimeout(tick, 800);
    }, 800);
  }

  function getPointerX(e) {
    return e.type.indexOf('touch') === 0 ? e.touches[0].clientX : e.clientX;
  }

  function onDragStart(e) {
    if (isOpen) return;
    e.preventDefault();
    var el = e.currentTarget;
    var side = el === leftWrap ? 'left' : 'right';
    dragTarget = side;
    isDragging = true;
    startX = getPointerX(e);
    el.classList.add('dragging');
    clearTimeout(autoTimer);
    hint.style.opacity = '0.3';
  }

  function onDragMove(e) {
    if (!isDragging || !dragTarget) return;
    e.preventDefault();
    var pt = getPointerX(e);
    var delta = pt - startX;
    var dir = dragTarget === 'left' ? 1 : -1;
    var rawAngle = delta * 0.8 * dir;
    var clampedAngle = Math.max(0, Math.min(MAX_ANGLE, rawAngle));
    setDoorAngle(dragTarget, clampedAngle);
    if (clampedAngle > 0) {
      var otherSide = dragTarget === 'left' ? 'right' : 'left';
      var otherAngle = getDoorAngle(otherSide);
      var targetOther = Math.min(clampedAngle, otherAngle + 2);
      if (targetOther > 0) setDoorAngle(otherSide, targetOther);
    }
  }

  function onDragEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    if (dragTarget) {
      var el = dragTarget === 'left' ? leftWrap : rightWrap;
      el.classList.remove('dragging');
      var angle = getDoorAngle(dragTarget);
      if (angle > THRESHOLD) { openDoor(); }
      else { closeDoor(); resetAutoTimer(); }
      dragTarget = null;
      hint.style.opacity = '1';
    }
  }

  function onClickDoor(e) {
    if (isOpen || isDragging) return;
    openDoor();
  }

  leftWrap.addEventListener('mousedown', onDragStart);
  rightWrap.addEventListener('mousedown', onDragStart);
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup', onDragEnd);
  leftWrap.addEventListener('touchstart', onDragStart, { passive: false });
  rightWrap.addEventListener('touchstart', onDragStart, { passive: false });
  document.addEventListener('touchmove', onDragMove, { passive: false });
  document.addEventListener('touchend', onDragEnd);
  frame.addEventListener('click', onClickDoor);

  if (sessionStorage.getItem('door_intro_shown')) {
    loader.classList.add('skip');
    // 如果跳过开门，直接触发飞鸟
    setTimeout(triggerBirdAndFall, 400);
    return;
  }
  sessionStorage.setItem('door_intro_shown', '1');
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    loader.classList.add('skip');
    setTimeout(triggerBirdAndFall, 400);
    return;
  }
  startAutoTimer();

  // 暴露开门方法给后续触发
  window.__openDoor = openDoor;
  window.__triggerBird = triggerBirdAndFall;

})();

// ============================================================
// 2. 飞鸟 + 文字显现 + 飘落物
// ============================================================

var birdTriggered = false;

function triggerBirdAndFall() {
  if (birdTriggered) return;
  birdTriggered = true;

  var birdContainer = document.getElementById('bird-container');
  var birdSvg = document.getElementById('bird-svg');
  var titleEl = document.getElementById('hero-title');

  if (!birdContainer || !birdSvg) return;

  // 激活飞鸟容器
  birdContainer.classList.add('active');

  // 拆分标题文字为逐字元素
  if (titleEl && !titleEl.dataset.split) {
    var html = titleEl.innerHTML;
    // 保留 em 标签，拆解文本节点
    var tempDiv = document.createElement('div');
    tempDiv.innerHTML = html;
    var chars = [];
    var nodes = tempDiv.childNodes;
    var charIndex = 0;

    function processNode(node) {
      if (node.nodeType === 3) { // 文本节点
        var text = node.textContent;
        for (var i = 0; i < text.length; i++) {
          var span = document.createElement('span');
          span.className = 'char delay-' + Math.min(charIndex + 1, 20);
          span.textContent = text[i];
          chars.push(span);
          charIndex++;
        }
      } else if (node.nodeType === 1) { // 元素节点
        var wrapper = document.createElement('span');
        wrapper.style.display = 'inline-block';
        var clone = node.cloneNode(false);
        for (var child of node.childNodes) {
          processNodeInto(child, clone);
        }
        wrapper.appendChild(clone);
        chars.push(wrapper);
        // 给 wrapper 也加延迟
        wrapper.className = 'char delay-' + Math.min(charIndex + 1, 20);
        charIndex++;
      }
    }

    function processNodeInto(node, parent) {
      if (node.nodeType === 3) {
        var text = node.textContent;
        for (var i = 0; i < text.length; i++) {
          var span = document.createElement('span');
          span.className = 'char delay-' + Math.min(charIndex + 1, 20);
          span.textContent = text[i];
          parent.appendChild(span);
          charIndex++;
        }
      } else if (node.nodeType === 1) {
        var clone = node.cloneNode(false);
        for (var child of node.childNodes) {
          processNodeInto(child, clone);
        }
        parent.appendChild(clone);
      }
    }

    // 重新构建
    var newHtml = '';
    var walker = document.createTreeWalker(tempDiv, NodeFilter.SHOW_TEXT | NodeFilter.SHOW_ELEMENT, null, false);
    var nodes2 = [];
    var node;
    while (node = walker.nextNode()) {
      if (node.nodeType === 3) {
        var text = node.textContent;
        for (var i = 0; i < text.length; i++) {
          var span = document.createElement('span');
          span.className = 'char delay-' + Math.min(charIndex + 1, 20);
          span.textContent = text[i];
          nodes2.push(span);
          charIndex++;
        }
      } else if (node.nodeType === 1) {
        var el = document.createElement(node.tagName.toLowerCase());
        for (var attr of node.attributes) {
          el.setAttribute(attr.name, attr.value);
        }
        nodes2.push(el);
        // 处理子节点
        for (var child of node.childNodes) {
          // 简单处理
        }
      }
    }

    // 更简单的方法：直接拆分
    var text = titleEl.textContent;
    var emContent = titleEl.querySelector('em');
    var emText = emContent ? emContent.textContent : '';

    var newHTML = '';
    var fullText = text;
    var charIdx = 0;

    // 按字符拆分，保留 em 标签
    var parts = [];
    var currentText = '';
    if (emContent) {
      var before = text.split(emText)[0];
      var after = text.split(emText)[1] || '';
      parts.push({ type: 'text', content: before });
      parts.push({ type: 'em', content: emText });
      parts.push({ type: 'text', content: after });
    } else {
      parts.push({ type: 'text', content: text });
    }

    var finalHtml = '';
    parts.forEach(function(part) {
      if (part.type === 'text') {
        for (var i = 0; i < part.content.length; i++) {
          var ch = part.content[i];
          if (ch === ' ' || ch === '\n' || ch === '\r') {
            finalHtml += ch;
          } else {
            var cls = 'char delay-' + Math.min(charIdx + 1, 20);
            finalHtml += '<span class="' + cls + '">' + ch + '</span>';
            charIdx++;
          }
        }
      } else if (part.type === 'em') {
        finalHtml += '<em>';
        for (var i = 0; i < part.content.length; i++) {
          var ch = part.content[i];
          var cls = 'char delay-' + Math.min(charIdx + 1, 20);
          finalHtml += '<span class="' + cls + '">' + ch + '</span>';
          charIdx++;
        }
        finalHtml += '</em>';
      }
    });

    titleEl.innerHTML = finalHtml;
    titleEl.dataset.split = '1';
  }

  // 启动飞鸟动画
  birdSvg.classList.add('bird-flying');

  // 飞鸟开始后，延迟触发文字显现
  setTimeout(function() {
    var chars = titleEl.querySelectorAll('.char');
    chars.forEach(function(el, index) {
      setTimeout(function() {
        el.classList.add('reveal');
      }, index * 50);
    });
  }, 800);

  // 飞鸟消失后，保持飘落物继续
  // 飘落物已经在下面启动了

  // 启动飘落物
  startFalling();
}

var fallAnimId = null;

    '<path d="M10,2 Q16,12 14,22 Q12,32 10,42 Q8,32 6,22 Q4,12 10,2" fill="' + color + '"/>' +
    '<path d="M10,2 L10,42" stroke="' + stroke + '" stroke-width="0.4"/>' +
    '<path d="M10,8 L6,12 M10,14 L5,18 M10,20 L4,24 M10,26 L5,30 M10,32 L6,36" stroke="' + stroke + '" stroke-width="0.3"/>' +
    '<path d="M10,8 L14,12 M10,14 L15,18 M10,20 L16,24 M10,26 L15,30 M10,32 L14,36" stroke="' + stroke + '" stroke-width="0.3"/>' +

}

// 橄榄叶 SVG
function createOliveSVG() {
  return '<svg viewBox="0 0 30 16" fill="none">' +
    '<ellipse cx="15" cy="8" rx="13" ry="6" fill="#6b8c5c" stroke="#4a6b3c" stroke-width="0.8"/>' +
    '<path d="M15,2 L15,14" stroke="#4a6b3c" stroke-width="0.6"/>' +
    '<path d="M15,5 L10,8 M15,8 L10,11 M15,5 L20,8 M15,8 L20,11" stroke="#4a6b3c" stroke-width="0.4" opacity="0.6"/>' +
    '</svg>';
}

function startFalling() {
  if (fallAnimId) return;

  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  var isEyeCare = document.documentElement.getAttribute('data-theme') === 'eye-care';
  var theme = isDark ? 'dark' : (isEyeCare ? 'eye-care' : 'light');

  var count = 18;
  var types = ['feather', 'olive'];
  var items = [];

  for (var i = 0; i < count; i++) {
    var type = types[Math.floor(Math.random() * types.length)];
    var size = type === 'feather' ? 16 + Math.random() * 12 : 20 + Math.random() * 14;
    var el = document.createElement('div');
    el.className = 'falling-item';
    var svgContent = type === 'feather' ? createFeatherSVG(theme) : createOliveSVG();
    el.innerHTML = svgContent;
    el.style.width = size + 'px';
    el.style.height = (type === 'feather' ? size * 2.8 : size * 0.6) + 'px';
    el.style.left = (Math.random() * 100) + '%';
    el.style.top = (-20 - Math.random() * 60) + '%';
    el.style.opacity = 0.5 + Math.random() * 0.4;

    fallingContainer.appendChild(el);

    items.push({
      el: el,
      x: parseFloat(el.style.left),
      y: parseFloat(el.style.top),
      speed: 0.3 + Math.random() * 0.6,
      swayAmp: 15 + Math.random() * 40,
      swaySpeed: 0.3 + Math.random() * 0.5,
      angle: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 1.2,
      type: type,
      size: size,
      phase: Math.random() * Math.PI * 2
    });
  }

  fallingItems = items;

  function animateFalling() {
    var viewH = window.innerHeight;
    items.forEach(function(item) {
      // 下落
      item.y += item.speed * 0.6;
      // 水平摆动
      item.phase += 0.02 * item.swaySpeed;
      var swayOffset = Math.sin(item.phase) * item.swayAmp * 0.15;
      // 旋转
      item.angle += item.rotSpeed * 0.5;

      var currentX = parseFloat(item.el.style.left) + swayOffset * 0.02;
      item.el.style.transform = 'translate(' + currentX + 'px, ' + item.y + 'px) rotate(' + item.angle + 'deg)';
      // 更新位置（用百分比）
      item.el.style.left = (parseFloat(item.el.style.left) + swayOffset * 0.02) + '%';
      // 如果超出底部，重置到顶部
      if (item.y > viewH + 60) {
        item.y = -40 - Math.random() * 60;
        item.el.style.left = (Math.random() * 95 + 2) + '%';
        item.x = parseFloat(item.el.style.left);
        item.speed = 0.3 + Math.random() * 0.6;
        item.swayAmp = 15 + Math.random() * 40;
        item.angle = Math.random() * 360;
        item.rotSpeed = (Math.random() - 0.5) * 1.2;
        item.el.style.opacity = 0.5 + Math.random() * 0.4;
        // 重置尺寸
        var newType = Math.random() > 0.5 ? 'feather' : 'olive';
        var newSize = newType === 'feather' ? 16 + Math.random() * 12 : 20 + Math.random() * 14;
        var svgContent = newType === 'feather' ? createFeatherSVG(theme) : createOliveSVG();
        item.el.innerHTML = svgContent;
        item.el.style.width = newSize + 'px';
        item.el.style.height = (newType === 'feather' ? newSize * 2.8 : newSize * 0.6) + 'px';
        item.type = newType;
        item.size = newSize;
        // 重置 transform
        item.el.style.transform = 'translate(0, ' + item.y + 'px) rotate(' + item.angle + 'deg)';
      }
    });
    fallAnimId = requestAnimationFrame(animateFalling);
  }

  animateFalling();

  // 监听主题变化，更新羽毛颜色
  var themeObserver = new MutationObserver(function() {
    var isDarkNow = document.documentElement.getAttribute('data-theme') === 'dark';
    var isEyeCareNow = document.documentElement.getAttribute('data-theme') === 'eye-care';
    var newTheme = isDarkNow ? 'dark' : (isEyeCareNow ? 'eye-care' : 'light');
    if (newTheme !== theme) {
      theme = newTheme;
      items.forEach(function(item) {
        if (item.type === 'feather') {
          var svgContent = createFeatherSVG(theme);
          item.el.innerHTML = svgContent;
        }
      });
    }
  });
  themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
}

(function(){
  var badge = document.getElementById('poem-count');
  if(!badge) return;
  fetch('poems/poems.json?t=' + Date.now()).then(function(r){ return r.json(); }).then(function(list){
    badge.textContent = list.length;
  }).catch(function(){ badge.textContent = '0'; });
})();

(function(){
  var btn = document.getElementById('music-toggle');
  var audio = document.getElementById('bg-music');
  var label = btn.querySelector('.label');
  var autoStarted = false;
  audio.volume = 0.35;
  function startPlaying(){
    if(autoStarted) return;
    audio.play().then(function(){
      autoStarted = true;
      btn.classList.add('playing');
      label.textContent = '暂停音乐';
    }).catch(function(){});
  }
  function stopPlaying(){
    audio.pause();
    btn.classList.remove('playing');
    label.textContent = '播放音乐';
  }
  btn.addEventListener('click', function(e){
    e.stopPropagation();
    if(audio.paused){ startPlaying(); } else { stopPlaying(); }
  });
  ['click','touchstart','keydown','scroll'].forEach(function(evt){
    window.addEventListener(evt, startPlaying, { once:true, passive:true });
  });
})();

(function(){
  var btns = document.querySelectorAll('#theme-side .theme-btn');
  if(!btns.length) return;
  function isNightTime() {
    var hour = new Date().getHours();
    return (hour >= 19 || hour < 6);
  }
  function applyTheme(theme) {
    if (theme === 'light') {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', theme);
    }
    localStorage.setItem('theme', theme);
    btns.forEach(function(btn){
      btn.classList.toggle('active', btn.getAttribute('data-theme') === theme);
    });
    // 更新飘落物颜色（如果有）
    updateFallingColors();
  }
  function updateFallingColors() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    var isEye = document.documentElement.getAttribute('data-theme') === 'eye-care';
    var theme = isDark ? 'dark' : (isEye ? 'eye-care' : 'light');
    var items = document.querySelectorAll('.falling-item');
    items.forEach(function(el) {
      var svg = el.querySelector('svg');
      if (!svg) return;
      // 判断是否是羽毛
      var paths = svg.querySelectorAll('path');
      if (paths.length > 0 && paths[0].getAttribute('fill')) {
        // 是羽毛
        var color = theme === 'dark' ? '#e0ddd6' : (theme === 'eye-care' ? '#f5efe0' : '#f5f0e8');
        var stroke = theme === 'dark' ? '#8a8a85' : (theme === 'eye-care' ? '#d5c8b8' : '#b9b7b0');
        paths[0].setAttribute('fill', color);
        paths[0].setAttribute('stroke', stroke);
        for (var i = 1; i < paths.length; i++) {
          paths[i].setAttribute('stroke', stroke);
        }
      }
    });
  }
  var saved = localStorage.getItem('theme');
  var initial;
  if (saved && (saved === 'light' || saved === 'dark' || saved === 'eye-care')) {
    initial = saved;
  } else {
    initial = isNightTime() ? 'dark' : 'light';
  }
  applyTheme(initial);
  btns.forEach(function(btn){
    btn.addEventListener('click', function(){
      applyTheme(this.getAttribute('data-theme'));
    });
  });
})();
