<style>

:root{
  --ink:      #1c1c1b;
  --charcoal: #373735;
  --steel:    #74736f;
  --fog:      #b9b7b0;
  --paper:    #eceae5;
  --paper-2:  #e0ddd6;
  --white:    #faf9f6;
  --accent-red:    #e0393e;
  --accent-cobalt: #2f5fa8;
  --accent-gold:   #e8a33d;
  --font-display: 'Fraunces', serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --maxw: 1100px;
}

*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{ background:var(--paper); color:var(--ink); font-family:var(--font-body); line-height:1.6; overflow-x:hidden; }
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
.wrap{ max-width:var(--maxw); margin:0 auto; padding:0 32px; }

/* 开场动画 */
#loader{
  position:fixed; inset:0; z-index:9999; background:var(--ink);
  display:flex; align-items:center; justify-content:center;
  transition:clip-path 0.9s cubic-bezier(.76,0,.24,1);
  clip-path:circle(150% at 50% 50%);
}
#loader.closing{ clip-path:circle(0% at 50% 50%); }
#loader.skip{ display:none; }
.loader-title{ position:relative; font-family:var(--font-display); font-weight:500; font-size:clamp(2.4rem, 8vw, 5.5rem); color:var(--white); letter-spacing:0.02em; }
.loader-title span{ position:absolute; top:0; left:0; animation: converge 1.6s cubic-bezier(.2,.8,.2,1) forwards; }
.loader-title .ch-r{ color:var(--accent-red); mix-blend-mode:screen; transform:translate(-14px,0); }
.loader-title .ch-b{ color:var(--accent-cobalt); mix-blend-mode:screen; transform:translate(14px,0); }
.loader-title .ch-base{ position:relative; opacity:0; animation: fadein 0.6s ease 1s forwards; }
@keyframes converge{ 0%{ transform:translate(var(--tx,0),0); opacity:1; } 70%{ opacity:0.7; } 100%{ transform:translate(0,0); opacity:0; } }
@keyframes fadein{ to{ opacity:1; } }
.loader-caption{
  position:absolute; bottom:60px; left:50%; transform:translateX(-50%);
  font-family:var(--font-mono); font-size:0.75rem; color:var(--fog);
  letter-spacing:0.15em; text-transform:uppercase;
  animation: fadein 0.6s ease 1.3s forwards; opacity:0;
}
@media (prefers-reduced-motion: reduce){
  .loader-title span{ animation:none !important; transform:none !important; opacity:0 !important; }
  .loader-title .ch-base{ opacity:1 !important; }
  #loader{ transition:none; }
}

/* 顶部导航 */
header{ position:fixed; top:0; left:0; right:0; z-index:100; padding:22px 0; mix-blend-mode:difference; }
header .wrap{ display:flex; justify-content:space-between; align-items:center; }
.logo{ font-family:var(--font-display); font-weight:600; font-size:1.1rem; color:var(--white); }
nav.top-nav ul{ list-style:none; display:flex; gap:28px; }
nav.top-nav a{ font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--white); position:relative; padding-bottom:2px; }
nav.top-nav a::after{ content:''; position:absolute; left:0; bottom:0; width:0; height:1px; background:var(--white); transition:width 0.3s ease; }
nav.top-nav a:hover::after{ width:100%; }
@media (max-width:640px){ nav.top-nav ul{ gap:16px; } }

/* 侧边分栏导航 */
.side-nav{
  position:fixed; left:24px; top:120px; z-index:150; width:168px;
  background:rgba(250,249,246,0.55); backdrop-filter:blur(16px) saturate(180%); -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid rgba(255,255,255,0.6); border-radius:6px; padding:10px;
  box-shadow:0 10px 34px rgba(28,28,27,0.10), inset 0 1px 0 rgba(255,255,255,0.5);
}
.side-nav a{ display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:2px; font-family:var(--font-body); font-size:0.88rem; color:var(--charcoal); transition:background 0.25s ease, color 0.25s ease; }
.side-nav a:hover{ background:rgba(255,255,255,0.55); }
.side-nav a.active{ background:rgba(255,255,255,0.7); color:var(--ink); font-weight:600; }
.side-nav a svg{ width:17px; height:17px; flex-shrink:0; stroke:currentColor; fill:none; stroke-width:1.6; }
.side-nav a .badge{ margin-left:auto; font-family:var(--font-mono); font-size:0.65rem; background:var(--paper); color:var(--steel); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; }
.side-nav a.active .badge{ background:var(--accent-gold); color:var(--white); }
@media (max-width:1180px){ .side-nav{ display:none; } }

/* Hero */
.hero{ min-height:100vh; display:flex; flex-direction:column; justify-content:center; position:relative; padding-top:100px; background:var(--paper); }
.hero-eyebrow{ font-family:var(--font-mono); font-size:0.75rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--steel); margin-bottom:18px; display:flex; align-items:center; gap:10px; }
.hero-eyebrow::before{ content:''; width:22px; height:1px; background:var(--accent-red); }
.hero h1{ font-family:var(--font-display); font-weight:500; font-size:clamp(2.6rem, 7vw, 5.4rem); line-height:1.05; letter-spacing:-0.01em; max-width:820px; }
.hero h1 em{ font-style:italic; font-weight:300; color:var(--steel); }
.hero-desc{ margin-top:26px; max-width:480px; color:var(--charcoal); font-size:1.02rem; }
.hero-olive{ width:34px; height:34px; color:var(--accent-gold); opacity:0.85; margin-bottom:20px; }
.hero-divider{ width:110px; height:11px; color:var(--fog); margin:26px 0 0; display:block; }
.hero-scroll{ position:absolute; bottom:40px; left:32px; font-family:var(--font-mono); font-size:0.7rem; color:var(--steel); display:flex; align-items:center; gap:10px; letter-spacing:0.1em; }
.hero-scroll .line{ width:1px; height:40px; background:var(--fog); position:relative; overflow:hidden; }
.hero-scroll .line::after{ content:''; position:absolute; top:-40px; left:0; width:100%; height:40px; background:var(--accent-red); animation:scrollline 2s ease-in-out infinite; }
@keyframes scrollline{ 50%{ top:40px; } 100%{ top:40px; } }

/* 入口卡片 */
.entry-grid{ padding:0 0 140px; display:grid; grid-template-columns:repeat(3,1fr); gap:2px; background:var(--paper-2); }
.entry-card{
  position:relative; overflow:hidden;
  background:var(--paper); padding:44px 32px; min-height:220px;
  display:flex; flex-direction:column; justify-content:space-between;
  transition:background 0.35s ease, color 0.35s ease;
}
.entry-card::before{
  content:''; position:absolute; top:0; left:-60%; width:40%; height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
  transform:skewX(-20deg); pointer-events:none;
  transition:left 0.7s ease;
}
.entry-card:hover::before{ left:130%; }
.entry-card:hover{ background:var(--ink); color:var(--white); }
.entry-num{ font-family:var(--font-mono); font-size:0.7rem; color:var(--accent-red); letter-spacing:0.1em; }
.entry-card h3{ font-family:var(--font-display); font-weight:500; font-size:1.6rem; margin-top:auto; }
.entry-arrow{ font-family:var(--font-mono); font-size:0.75rem; margin-top:14px; color:var(--steel); }
.entry-card:hover .entry-arrow{ color:var(--accent-gold); }
@media (max-width:900px){ .entry-grid{ grid-template-columns:1fr 1fr; } }
@media (max-width:640px){ .entry-grid{ grid-template-columns:1fr; } }

footer{ padding:30px 0; text-align:center; font-family:var(--font-mono); font-size:0.68rem; color:var(--steel); background:var(--ink); }

/* 音乐播放按钮 */
#music-toggle{ position:fixed; right:28px; bottom:28px; z-index:200; width:56px; height:56px; border-radius:50%; background:var(--ink); border:1px solid var(--charcoal); display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.25); transition:border-color 0.3s ease; }
#music-toggle:hover{ border-color:var(--accent-gold); }
#music-toggle .ring{ position:absolute; inset:-4px; border-radius:50%; border:1px solid var(--accent-gold); opacity:0; transform:scale(0.85); transition:opacity 0.3s ease; }
#music-toggle.playing .ring{ opacity:1; animation: pulse-ring 1.8s ease-out infinite; }
@keyframes pulse-ring{ 0%{ transform:scale(0.85); opacity:0.8; } 100%{ transform:scale(1.35); opacity:0; } }
#music-toggle .bars{ display:flex; align-items:flex-end; gap:3px; height:16px; }
#music-toggle .bars span{ width:3px; background:var(--fog); border-radius:1px; height:6px; transition:background 0.3s ease; }
#music-toggle.playing .bars span{ background:var(--accent-gold); }
#music-toggle.playing .bars span:nth-child(1){ animation:bar1 1.1s ease-in-out infinite; }
#music-toggle.playing .bars span:nth-child(2){ animation:bar2 0.9s ease-in-out infinite; }
#music-toggle.playing .bars span:nth-child(3){ animation:bar3 1.3s ease-in-out infinite; }
@keyframes bar1{ 0%,100%{ height:6px; } 50%{ height:16px; } }
@keyframes bar2{ 0%,100%{ height:10px; } 50%{ height:4px; } }
@keyframes bar3{ 0%,100%{ height:6px; } 50%{ height:14px; } }
#music-toggle .label{ position:absolute; right:66px; top:50%; transform:translateY(-50%); font-family:var(--font-mono); font-size:0.68rem; color:var(--white); background:var(--ink); padding:6px 10px; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
#music-toggle:hover .label{ opacity:1; }
@media (max-width:640px){ #music-toggle{ right:18px; bottom:18px; width:50px; height:50px; } #music-toggle .label{ display:none; } }

</style>

<audio id="bg-music" loop preload="none">
  <source src="music/background.mp3" type="audio/mpeg">
</audio>
<button id="music-toggle" type="button" aria-label="播放音乐">
  <span class="ring"></span>
  <span class="bars"><span></span><span></span><span></span></span>
  <span class="label">播放音乐</span>
</button>

<script>
// 开场动画：本次会话只播放一次
(function(){
  var loader = document.getElementById('loader');
  if(sessionStorage.getItem('introShown')){
    loader.classList.add('skip');
    return;
  }
  sessionStorage.setItem('introShown', '1');
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var delay = reduce ? 0 : 1800;
  setTimeout(function(){
    loader.classList.add('closing');
    setTimeout(function(){ loader.style.display = 'none'; }, 900);
  }, delay);
})();

// 侧边导航：读取诗歌数量显示在徽标上
(function(){
  var badge = document.getElementById('poem-count');
  if(!badge) return;
  fetch('poems/poems.json?t=' + Date.now()).then(function(r){ return r.json(); }).then(function(list){
    badge.textContent = list.length;
  }).catch(function(){ badge.textContent = '0'; });
})();

// 音乐播放/暂停
(function(){
  var btn = document.getElementById('music-toggle');
  var audio = document.getElementById('bg-music');
  var label = btn.querySelector('.label');
  var autoStarted = false;
  audio.volume = 0.35;

  function startPlaying(){
    if(autoStarted) return;
    audio.play().then(function(){
      autoStarted = true;
      btn.classList.add('playing');
      label.textContent = '暂停音乐';
    }).catch(function(){});
  }
  function stopPlaying(){
    audio.pause();
    btn.classList.remove('playing');
    label.textContent = '播放音乐';
  }
  btn.addEventListener('click', function(e){
    e.stopPropagation();
    if(audio.paused){ startPlaying(); } else { stopPlaying(); }
  });
  ['click','touchstart','keydown','scroll'].forEach(function(evt){
    window.addEventListener(evt, startPlaying, { once:true, passive:true });
  });
})();
</script>
