<style>
:root{
  --ink:      #1c1c1b;
  --charcoal: #373735;
  --steel:    #74736f;
  --fog:      #b9b7b0;
  --paper:    #eceae5;
  --paper-2:  #e0ddd6;
  --white:    #faf9f6;
  --accent-red:    #e0393e;
  --accent-cobalt: #2f5fa8;
  --accent-gold:   #e8a33d;
  --font-display: 'Fraunces', serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --maxw: 1100px;
}

[data-theme="dark"] {
  --ink: #ecece5;
  --charcoal: #c4c4be;
  --steel: #8a8a85;
  --fog: #4a4a45;
  --paper: #1a1a19;
  --paper-2: #2a2a27;
  --white: #222221;
  --accent-red: #e55a5f;
  --accent-gold: #d4a373;
}
[data-theme="eye-care"] {
  --paper: #f5efe0;
  --paper-2: #ede5d0;
  --white: #faf5e8;
  --ink: #4a3f35;
  --charcoal: #6b5f52;
  --steel: #9a8b7a;
  --fog: #d5c8b8;
  --accent-red: #c46a52;
  --accent-gold: #c9a87a;
}

*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  line-height:1.6;
  overflow-x:hidden;
  transition: background 0.3s ease, color 0.3s ease;
}
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
.wrap{ max-width:var(--maxw); margin:0 auto; padding:0 32px; }

/* ============================================================
   开幕动画遮罩
   ============================================================ */

#intro-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: #0a0908;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 1.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.8s ease;
  opacity: 1;
  visibility: visible;
  pointer-events: none;
}
#intro-overlay.hidden {
  opacity: 0;
  visibility: hidden;
}
#intro-overlay.skip {
  display: none;
}

.intro-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.intro-bg .glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.06;
}
.intro-bg .glow-1 {
  width: 60%;
  height: 60%;
  top: 20%;
  left: 20%;
  background: var(--accent-gold);
}
.intro-bg .glow-2 {
  width: 40%;
  height: 50%;
  bottom: 5%;
  right: 5%;
  background: var(--accent-gold);
  opacity: 0.03;
}

.intro-stars {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.intro-stars .star {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
}
.intro-stars .star:nth-child(1) { width: 2px; height: 2px; top: 10%; left: 6%; animation: twinkle 3.2s ease-in-out infinite; }
.intro-stars .star:nth-child(2) { width: 2px; height: 2px; top: 22%; left: 88%; animation: twinkle 2.6s ease-in-out infinite 0.6s; }
.intro-stars .star:nth-child(3) { width: 2px; height: 2px; top: 50%; left: 3%; animation: twinkle 3.8s ease-in-out infinite 1.4s; }
.intro-stars .star:nth-child(4) { width: 2px; height: 2px; top: 68%; left: 94%; animation: twinkle 2.8s ease-in-out infinite 0.3s; }
.intro-stars .star:nth-child(5) { width: 2px; height: 2px; top: 38%; left: 97%; animation: twinkle 3.4s ease-in-out infinite 0.9s; }
.intro-stars .star:nth-child(6) { width: 2px; height: 2px; top: 82%; left: 12%; animation: twinkle 2.4s ease-in-out infinite 1.8s; }
.intro-stars .star:nth-child(7) { width: 2px; height: 2px; top: 12%; left: 48%; animation: twinkle 4.2s ease-in-out infinite 0.2s; }
.intro-stars .star:nth-child(8) { width: 2px; height: 2px; top: 58%; left: 45%; animation: twinkle 2.8s ease-in-out infinite 1.1s; }
.intro-stars .star:nth-child(9) { width: 2px; height: 2px; top: 90%; left: 75%; animation: twinkle 3.0s ease-in-out infinite 0.7s; }
.intro-stars .star:nth-child(10) { width: 2px; height: 2px; top: 32%; left: 15%; animation: twinkle 3.6s ease-in-out infinite 2.0s; }
@keyframes twinkle {
  0%, 100% { opacity: 0.07; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.5); }
}

#ripple-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  pointer-events: none;
  z-index: 2;
}

#intro-caption {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.06);
  z-index: 4;
  pointer-events: none;
  opacity: 0;
  animation: captionFade 2.4s ease 3.6s forwards;
}
@keyframes captionFade {
  0% { opacity: 0; transform: translateX(-50%) translateY(8px); }
  100% { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@media (max-width: 640px) {
  #intro-caption { font-size: 0.45rem; bottom: 50px; }
}

/* ============================================================
   首页内容
   ============================================================ */

.page-content {
  opacity: 0;
  transition: opacity 1.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.page-content.visible {
  opacity: 1;
}

.hero h1 .char {
  display: inline-block;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
}
.hero h1 .char.reveal {
  opacity: 1;
  transform: translateY(0);
}
.hero h1 .char.delay-1 { transition-delay: 0.05s; }
.hero h1 .char.delay-2 { transition-delay: 0.10s; }
.hero h1 .char.delay-3 { transition-delay: 0.15s; }
.hero h1 .char.delay-4 { transition-delay: 0.20s; }
.hero h1 .char.delay-5 { transition-delay: 0.25s; }
.hero h1 .char.delay-6 { transition-delay: 0.30s; }
.hero h1 .char.delay-7 { transition-delay: 0.35s; }
.hero h1 .char.delay-8 { transition-delay: 0.40s; }
.hero h1 .char.delay-9 { transition-delay: 0.45s; }
.hero h1 .char.delay-10 { transition-delay: 0.50s; }
.hero h1 .char.delay-11 { transition-delay: 0.55s; }
.hero h1 .char.delay-12 { transition-delay: 0.60s; }
.hero h1 .char.delay-13 { transition-delay: 0.65s; }
.hero h1 .char.delay-14 { transition-delay: 0.70s; }
.hero h1 .char.delay-15 { transition-delay: 0.75s; }
.hero h1 .char.delay-16 { transition-delay: 0.80s; }
.hero h1 .char.delay-17 { transition-delay: 0.85s; }
.hero h1 .char.delay-18 { transition-delay: 0.90s; }
.hero h1 .char.delay-19 { transition-delay: 0.95s; }
.hero h1 .char.delay-20 { transition-delay: 1.00s; }

.falling-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 40;
  overflow: hidden;
}
.falling-item {
  position: absolute;
  top: -60px;
  opacity: 0.3;
  will-change: transform;
  pointer-events: none;
  animation: fall linear infinite;
}
.falling-item svg {
  display: block;
  width: 100%;
  height: 100%;
}
@keyframes fall {
  0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0.03; }
}

/* ============================================================
   原有样式
   ============================================================ */

header{ position:fixed; top:0; left:0; right:0; z-index:100; padding:22px 0; mix-blend-mode:difference; }
header .wrap{ display:flex; justify-content:space-between; align-items:center; }
.logo{ font-family:var(--font-display); font-weight:600; font-size:1.1rem; color:var(--white); }
nav.top-nav ul{ list-style:none; display:flex; gap:28px; }
nav.top-nav a{ font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--white); position:relative; padding-bottom:2px; }
nav.top-nav a::after{ content:''; position:absolute; left:0; bottom:0; width:0; height:1px; background:var(--white); transition:width 0.3s ease; }
nav.top-nav a:hover::after{ width:100%; }
@media (max-width:640px){ nav.top-nav ul{ gap:16px; } }

.side-nav{
  position:fixed; left:24px; top:120px; z-index:150; width:168px;
  background:rgba(255,255,255,0.6); backdrop-filter:blur(16px) saturate(180%); -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid rgba(255,255,255,0.6); border-radius:6px; padding:10px;
  box-shadow:0 10px 34px rgba(28,28,27,0.10), inset 0 1px 0 rgba(255,255,255,0.5);
  transition: background 0.3s ease, border-color 0.3s ease;
}
.side-nav a{ display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:2px; font-family:var(--font-body); font-size:0.88rem; color:var(--charcoal); transition:background 0.25s ease, color 0.25s ease; }
.side-nav a:hover{ background:var(--paper-2); }
.side-nav a.active{ background:var(--paper-2); color:var(--ink); font-weight:600; }
.side-nav a svg{ width:17px; height:17px; flex-shrink:0; stroke:currentColor; fill:none; stroke-width:1.6; }
.side-nav a .badge{ margin-left:auto; font-family:var(--font-mono); font-size:0.65rem; background:var(--paper); color:var(--steel); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; }
.side-nav a.active .badge{ background:var(--accent-gold); color:var(--white); }
@media (max-width:1180px){ .side-nav{ display:none; } }

.side-theme{
  position:fixed; left:24px; bottom:100px; z-index:150;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  background:rgba(255,255,255,0.4); backdrop-filter:blur(12px);
  padding:10px 8px; border-radius:28px; border:1px solid var(--fog);
  transition: background 0.3s ease, border-color 0.3s ease;
}
.side-theme .theme-btn{
  width:34px; height:34px; border-radius:50%; border:none;
  background:transparent; cursor:pointer;
  transition:background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
  display:flex; align-items:center; justify-content:center;
  padding:0;
}
.side-theme .theme-btn svg{
  width:22px; height:22px; stroke:var(--charcoal); stroke-width:1.8;
  fill:none; display:block;
  transition: stroke 0.25s ease;
}
.side-theme .theme-btn:hover{ background:var(--paper-2); transform:scale(1.08); }
.side-theme .theme-btn.active{
  background:var(--accent-gold);
  box-shadow:0 0 0 2px var(--accent-gold);
}
.side-theme .theme-btn.active svg{ stroke:var(--white); }
.side-theme .line{
  width:2px; height:10px; background:var(--fog); border-radius:1px;
  transition: background 0.3s ease;
}
@media (max-width:1180px){ .side-theme{ display:none; } }

.hero{ min-height:100vh; display:flex; flex-direction:column; justify-content:center; position:relative; padding-top:100px; background:var(--paper); }
.hero-eyebrow{ font-family:var(--font-mono); font-size:0.75rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--steel); margin-bottom:18px; display:flex; align-items:center; gap:10px; }
.hero-eyebrow::before{ content:''; width:22px; height:1px; background:var(--accent-red); }
.hero h1{ font-family:var(--font-display); font-weight:500; font-size:clamp(2.6rem, 7vw, 5.4rem); line-height:1.05; letter-spacing:-0.01em; max-width:820px; }
.hero h1 em{ font-style:italic; font-weight:300; color:var(--steel); }
.hero-desc{ margin-top:26px; max-width:480px; color:var(--charcoal); font-size:1.02rem; }
.hero-olive{ width:34px; height:34px; color:var(--accent-gold); opacity:0.85; margin-bottom:20px; }
.hero-divider{ width:110px; height:11px; color:var(--fog); margin:26px 0 0; display:block; }
.hero-scroll{ position:absolute; bottom:40px; left:32px; font-family:var(--font-mono); font-size:0.7rem; color:var(--steel); display:flex; align-items:center; gap:10px; letter-spacing:0.1em; }
.hero-scroll .line{ width:1px; height:40px; background:var(--fog); position:relative; overflow:hidden; }
.hero-scroll .line::after{ content:''; position:absolute; top:-40px; left:0; width:100%; height:40px; background:var(--accent-red); animation:scrollline 2s ease-in-out infinite; }
@keyframes scrollline{ 50%{ top:40px; } 100%{ top:40px; } }

.entry-grid{ padding:0 0 140px; display:grid; grid-template-columns:repeat(3,1fr); gap:2px; background:var(--paper-2); }
.entry-card{
  background:var(--paper); padding:44px 32px; min-height:220px;
  display:flex; flex-direction:column; justify-content:space-between;
  transition:background 0.35s ease, color 0.35s ease;
}
.entry-card:hover{ background:var(--ink); color:var(--white); }
.entry-num{ font-family:var(--font-mono); font-size:0.7rem; color:var(--accent-red); letter-spacing:0.1em; }
.entry-card h3{ font-family:var(--font-display); font-weight:500; font-size:1.6rem; margin-top:auto; }
.entry-arrow{ font-family:var(--font-mono); font-size:0.75rem; margin-top:14px; color:var(--steel); }
.entry-card:hover .entry-arrow{ color:var(--accent-gold); }
@media (max-width:900px){ .entry-grid{ grid-template-columns:1fr 1fr; } }
@media (max-width:640px){ .entry-grid{ grid-template-columns:1fr; } }

footer{ padding:30px 0; text-align:center; font-family:var(--font-mono); font-size:0.68rem; color:var(--steel); background:var(--ink); }

#music-toggle{ position:fixed; right:28px; bottom:28px; z-index:200; width:56px; height:56px; border-radius:50%; background:var(--ink); border:1px solid var(--charcoal); display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.25); transition:border-color 0.3s ease; }
#music-toggle:hover{ border-color:var(--accent-gold); }
#music-toggle .ring{ position:absolute; inset:-4px; border-radius:50%; border:1px solid var(--accent-gold); opacity:0; transform:scale(0.85); transition:opacity 0.3s ease; }
#music-toggle.playing .ring{ opacity:1; animation: pulse-ring 1.8s ease-out infinite; }
@keyframes pulse-ring{ 0%{ transform:scale(0.85); opacity:0.8; } 100%{ transform:scale(1.35); opacity:0; } }
#music-toggle .bars{ display:flex; align-items:flex-end; gap:3px; height:16px; }
#music-toggle .bars span{ width:3px; background:var(--fog); border-radius:1px; height:6px; transition:background 0.3s ease; }
#music-toggle.playing .bars span{ background:var(--accent-gold); }
#music-toggle.playing .bars span:nth-child(1){ animation:bar1 1.1s ease-in-out infinite; }
#music-toggle.playing .bars span:nth-child(2){ animation:bar2 0.9s ease-in-out infinite; }
#music-toggle.playing .bars span:nth-child(3){ animation:bar3 1.3s ease-in-out infinite; }
@keyframes bar1{ 0%,100%{ height:6px; } 50%{ height:16px; } }
@keyframes bar2{ 0%,100%{ height:10px; } 50%{ height:4px; } }
@keyframes bar3{ 0%,100%{ height:6px; } 50%{ height:14px; } }
#music-toggle .label{ position:absolute; right:66px; top:50%; transform:translateY(-50%); font-family:var(--font-mono); font-size:0.68rem; color:var(--white); background:var(--ink); padding:6px 10px; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
#music-toggle:hover .label{ opacity:1; }
@media (max-width:640px){ #music-toggle{ right:18px; bottom:18px; width:50px; height:50px; } #music-toggle .label{ display:none; } }
</style>
</head>

    <svg class="hero-olive" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.3">

    </svg>

<script>
// ============================================================
// 浮世绘海浪涟漪（含粗细变化与随机性）
// ============================================================

(function() {
  var overlay = document.getElementById('intro-overlay');
  var canvas = document.getElementById('ripple-canvas');
  var ctx = canvas.getContext('2d');
  var pageContent = document.getElementById('page-content');

  // ===== 尺寸 =====
  var W, H, cx, cy, maxR;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2;
    cy = H * 0.55;
    maxR = Math.max(W, H) * 0.78;
  }
  resize();
  window.addEventListener('resize', resize);

  // ===== 配置 =====
  var NUM_RINGS = 8;
  var RING_DELAY = 0.32;
  var TOTAL_DURATION = 4.2;
  var startTime = null;
  var animId = null;

  // ===== 工具：随机数 =====
  function rand(min, max) {
    return min + Math.random() * (max - min);
  }

  function randInt(min, max) {
    return Math.floor(rand(min, max + 1));
  }

  // ===== 绘制单个浪尖（带粗细变化 + 随机性） =====
  function drawWaveCrest(ctx, ox, oy, radius, angle, ringIdx, progress, seed) {
    // progress: 0→1 表示该浪尖在整圈涟漪中的生命进程

    // 随机因子（基于种子保证每帧一致）
    var s = seed || 0;
    var r1 = Math.sin(s * 1.7 + 3.2) * 0.5 + 0.5;
    var r2 = Math.sin(s * 2.3 + 5.1) * 0.5 + 0.5;
    var r3 = Math.sin(s * 3.1 + 7.7) * 0.5 + 0.5;

    // 基础长度（随机变化 30%）
    var baseLen = radius * 0.16 * (0.7 + 0.3 * r1);
    // 长度随进度衰减（越晚越短）
    var lenScale = 1 - progress * 0.5;
    var len = baseLen * lenScale * (0.8 + 0.2 * r2);

    // 如果长度太小则跳过
    if (len < 3) return;

    // 方向
    var dirX = Math.cos(angle);
    var dirY = Math.sin(angle);
    var perpX = -Math.sin(angle);
    var perpY = Math.cos(angle);

    // 环上起点
    var sx = ox + radius * dirX;
    var sy = oy + radius * dirY;

    // ---- 浪尖曲线：三个控制点，产生自然卷曲 ----
    // 控制点1：向外伸展（偏移量随机）
    var cp1Dist = len * (0.4 + 0.2 * r2);
    var cp1AngleOffset = 0.15 * (r3 - 0.5) * 2;
    var cp1x = sx + cp1Dist * Math.cos(angle + cp1AngleOffset);
    var cp1y = sy + cp1Dist * Math.sin(angle + cp1AngleOffset);

    // 控制点2：卷曲顶点（向外更远，且横向偏移）
    var cp2Dist = len * (0.8 + 0.15 * r1);
    var cp2AngleOffset = 0.3 * (r2 - 0.3) * 0.8 + 0.2;
    var cp2x = sx + cp2Dist * Math.cos(angle + cp2AngleOffset);
    var cp2y = sy + cp2Dist * Math.sin(angle + cp2AngleOffset);

    // 终点：向内回卷（形成浪花卷曲）
    var endDist = len * (0.5 + 0.2 * r3);
    var endAngleOffset = 0.6 * (r1 - 0.2) * 0.6 + 0.3;
    var ex = sx + endDist * Math.cos(angle + endAngleOffset);
    var ey = sy + endDist * Math.sin(angle + endAngleOffset);

    // ---- 透明度与颜色 ----
    var alpha = 0.65 * (1 - progress * 0.7) * (0.8 + 0.2 * r1);
    if (alpha < 0.02) return;

    // ---- 粗细变化：从根部粗到尖端细（渐变） ----
    var baseWidth = 3.2 * (1 - progress * 0.4) * (0.6 + 0.4 * r2);
    var tipWidth = baseWidth * 0.15 * (0.5 + 0.5 * r3);

    // 绘制主浪（使用 Bezier 曲线，逐段绘制实现粗细渐变）
    ctx.save();
    ctx.globalAlpha = Math.min(alpha, 0.8);

    // 分段绘制：将曲线分成多段，每段用不同粗细
    var segments = 6;
    var points = [];
    for (var i = 0; i <= segments; i++) {
      var t = i / segments;
      // 三次贝塞尔曲线（从起点→cp1→cp2→终点）
      var mt = 1 - t;
      var px = mt * mt * mt * sx + 3 * mt * mt * t * cp1x + 3 * mt * t * t * cp2x + t * t * t * ex;
      var py = mt * mt * mt * sy + 3 * mt * mt * t * cp1y + 3 * mt * t * t * cp2y + t * t * t * ey;
      points.push({ x: px, y: py, t: t });
    }

    // 逐段绘制，粗细渐变
    for (var i = 0; i < points.length - 1; i++) {
      var p0 = points[i];
      var p1 = points[i + 1];
      var t0 = p0.t;
      var t1 = p1.t;

      // 粗细：从根部到尖端线性递减
      var w0 = baseWidth * (1 - t0 * 0.9) + tipWidth * t0 * 0.9;
      var w1 = baseWidth * (1 - t1 * 0.9) + tipWidth * t1 * 0.9;

      // 对短线段，宽度取平均
      var avgW = (w0 + w1) / 2;

      // 颜色渐变：根部更亮，尖端稍暗
      var bright = 1 - t0 * 0.3;
      var r = Math.round(232 * bright);
      var g = Math.round(163 * bright);
      var b = Math.round(61 * bright);

      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.strokeStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + (alpha * 0.9) + ')';
      ctx.lineWidth = avgW;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
    }

    // ---- 浪尖的小分支（飞沫） ----
    if (progress > 0.15 && progress < 0.7 && len > 8) {
      var branchAlpha = 0.15 * (1 - Math.abs(progress - 0.4) * 2.5) * (0.5 + 0.5 * r3);
      if (branchAlpha > 0.01) {
        var tip = points[points.length - 1];
        var dirAngle = Math.atan2(ey - cp2y, ex - cp2x);
        var numBranches = randInt(1, 3);

        for (var b = 0; b < numBranches; b++) {
          var bAngle = dirAngle + rand(-0.6, 0.6) + (b - (numBranches - 1) / 2) * 0.4;
          var bLen = len * rand(0.12, 0.25) * (1 - progress * 0.3);
          var bx = tip.x + bLen * Math.cos(bAngle);
          var by = tip.y + bLen * Math.sin(bAngle);

          ctx.beginPath();
          ctx.moveTo(tip.x, tip.y);
          var midX = tip.x + bLen * 0.4 * Math.cos(bAngle + rand(-0.2, 0.2));
          var midY = tip.y + bLen * 0.4 * Math.sin(bAngle + rand(-0.2, 0.2));
          ctx.quadraticCurveTo(midX, midY, bx, by);
          ctx.strokeStyle = 'rgba(232, 200, 120, ' + (branchAlpha * 0.6) + ')';
          ctx.lineWidth = avgW * 0.25;
          ctx.stroke();

          // 分支末端小光点
          if (branchAlpha > 0.05) {
            ctx.beginPath();
            ctx.arc(bx, by, avgW * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(232, 200, 120, ' + (branchAlpha * 0.4) + ')';
            ctx.fill();
          }
        }
      }
    }

    // ---- 浪尖光晕 ----
    if (progress > 0.05 && progress < 0.5) {
      var glowAlpha = 0.04 * (1 - progress * 1.8) * (0.5 + 0.5 * r1);
      if (glowAlpha > 0.003) {
        var tip = points[points.length - 1];
        var grad = ctx.createRadialGradient(tip.x, tip.y, 0, tip.x, tip.y, len * 0.5);
        grad.addColorStop(0, 'rgba(232, 200, 120, ' + glowAlpha + ')');
        grad.addColorStop(1, 'rgba(232, 200, 120, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(tip.x, tip.y, len * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.restore();
  }

  // ===== 绘制单圈涟漪 =====
  function drawRing(ctx, ringIdx, progress) {
    if (progress <= 0 || progress > 1) return;

    var radius = progress * maxR * 0.82;
    if (radius < 3) return;

    // 计算该圈有多少个浪尖（随机 8~14 个）
    var baseCount = 8 + ringIdx % 4;
    var count = baseCount + Math.floor(Math.sin(ringIdx * 1.3 + 0.5) * 2);
    count = Math.max(6, Math.min(16, count));

    // 对每个浪尖，加入角度随机偏移
    var angleOffset = ringIdx * 0.12;

    for (var i = 0; i < count; i++) {
      var angle = (i / count) * Math.PI * 2 + angleOffset;
      // 随机微调角度，让浪尖不是完美均匀分布
      var jitter = 0.04 * Math.sin(i * 0.7 + ringIdx * 1.1);
      angle += jitter;

      // 种子用于生成一致的随机性
      var seed = i * 7.3 + ringIdx * 13.7 + 0.3;

      // 每个浪尖的进度微调（使它们不完全同步，更自然）
      var localProgress = Math.min(1, progress * (0.85 + 0.15 * Math.sin(i * 1.3 + ringIdx * 0.7)));

      drawWaveCrest(ctx, cx, cy, radius, angle, ringIdx, localProgress, seed);
    }

    // ---- 环上微光带（增加层次感） ----
    if (progress > 0.05 && progress < 0.55) {
      var bandAlpha = 0.03 * (1 - progress * 1.2) * (0.5 + 0.5 * Math.sin(ringIdx * 0.5));
      if (bandAlpha > 0.005) {
        ctx.save();
        ctx.globalAlpha = bandAlpha;
        ctx.strokeStyle = 'rgba(232, 200, 140, 0.2)';
        ctx.lineWidth = 0.8 * (1 - progress * 0.3);
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 0.95, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    // ---- 环上细小光点 ----
    if (progress > 0.1 && progress < 0.6) {
      var dotAlpha = 0.025 * (1 - progress * 1.4);
      if (dotAlpha > 0.005) {
        ctx.save();
        ctx.globalAlpha = dotAlpha;
        var dotCount = 12 + ringIdx % 6;
        for (var i = 0; i < dotCount; i++) {
          var a = (i / dotCount) * Math.PI * 2 + ringIdx * 0.3;
          var rOff = radius * (0.92 + 0.08 * Math.sin(i * 1.3 + ringIdx * 0.9));
          var dx = cx + rOff * Math.cos(a);
          var dy = cy + rOff * Math.sin(a);
          ctx.fillStyle = 'rgba(232, 200, 140, 0.3)';
          ctx.beginPath();
          ctx.arc(dx, dy, 0.5 + 0.6 * (1 - progress), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }
  }

  // ===== 动画循环 =====
  function animate(time) {
    if (!startTime) startTime = time;
    var elapsed = (time - startTime) / 1000;

    ctx.clearRect(0, 0, W, H);

    for (var i = 0; i < NUM_RINGS; i++) {
      var progress = (elapsed - i * RING_DELAY) / TOTAL_DURATION;
      drawRing(ctx, i, progress);
    }

    var allDone = true;
    for (var i = 0; i < NUM_RINGS; i++) {
      var p = (elapsed - i * RING_DELAY) / TOTAL_DURATION;
      if (p < 1.0) allDone = false;
    }

    if (allDone && elapsed > TOTAL_DURATION + NUM_RINGS * RING_DELAY + 0.8) {
      if (animId) {
        cancelAnimationFrame(animId);
        animId = null;
      }
      showPage();
      return;
    }

    animId = requestAnimationFrame(animate);
  }

  // ===== 显示页面 =====
  var pageShown = false;

  function showPage() {
    if (pageShown) return;
    pageShown = true;

    pageContent.classList.add('visible');
    setTimeout(function() {
      overlay.classList.add('hidden');
      setTimeout(function() {
        overlay.style.display = 'none';
        if (canvas) {
          canvas.width = 0;
          canvas.height = 0;
        }
      }, 1800);
    }, 400);

    setTimeout(triggerTitleReveal, 600);
  }

  // ===== 标题逐字显现 =====
  function triggerTitleReveal() {
    var titleEl = document.getElementById('hero-title');
    if (!titleEl || titleEl.dataset.split) return;

    var parts = [];
    var emContent = titleEl.querySelector('em');
    var fullText = titleEl.textContent;
    var emText = emContent ? emContent.textContent : '';

    if (emContent) {
      var before = fullText.split(emText)[0] || '';
      var after = fullText.split(emText)[1] || '';
      parts.push({ type: 'text', content: before });
      parts.push({ type: 'em', content: emText });
      parts.push({ type: 'text', content: after });
    } else {
      parts.push({ type: 'text', content: fullText });
    }

    var finalHtml = '';
    var charIdx = 0;
    parts.forEach(function(part) {
      if (part.type === 'text') {
        for (var i = 0; i < part.content.length; i++) {
          var ch = part.content[i];
          if (ch === ' ' || ch === '\n' || ch === '\r') {
            finalHtml += ch;
          } else {
            var cls = 'char delay-' + Math.min(charIdx + 1, 20);
            finalHtml += '<span class="' + cls + '">' + ch + '</span>';
            charIdx++;
          }
        }
      } else if (part.type === 'em') {
        finalHtml += '<em>';
        for (var i = 0; i < part.content.length; i++) {
          var ch = part.content[i];
          var cls = 'char delay-' + Math.min(charIdx + 1, 20);
          finalHtml += '<span class="' + cls + '">' + ch + '</span>';
          charIdx++;
        }
        finalHtml += '</em>';
      }
    });

    titleEl.innerHTML = finalHtml;
    titleEl.dataset.split = '1';

    var chars = titleEl.querySelectorAll('.char');
    chars.forEach(function(el, index) {
      setTimeout(function() {
        el.classList.add('reveal');
      }, index * 45);
    });
  }

  // ===== 启动 =====
  if (sessionStorage.getItem('intro_ripple_shown')) {
    overlay.classList.add('skip');
    pageContent.classList.add('visible');
    return;
  }

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    overlay.classList.add('skip');
    pageContent.classList.add('visible');
    return;
  }

  sessionStorage.setItem('intro_ripple_shown', '1');

  requestAnimationFrame(function() {
    setTimeout(function() {
      startTime = null;
      animId = requestAnimationFrame(animate);
    }, 100);
  });

})();

// ============================================================
// 持续飘落物
// ============================================================

(function() {
  var container = document.getElementById('falling-container');
  if (!container) return;

  var count = 8;
  var types = ['feather', 'olive'];

  function createFeatherSVG(theme) {
    var color = theme === 'dark' ? '#d4cfc8' : (theme === 'eye-care' ? '#f0ebe0' : '#f5f0eb');
    var stroke = theme === 'dark' ? '#8a8a85' : (theme === 'eye-care' ? '#d5c8b8' : '#c9c0b8');
    return '<svg viewBox="0 0 20 60" fill="none" stroke="' + stroke + '" stroke-width="0.5">' +
      '<path d="M10,2 Q16,12 14,22 Q12,32 10,42 Q8,32 6,22 Q4,12 10,2" fill="' + color + '"/>' +
      '<path d="M10,2 L10,42" stroke="' + stroke + '" stroke-width="0.3"/>' +
      '<path d="M10,8 L6,12 M10,14 L5,18 M10,20 L4,24 M10,26 L5,30 M10,32 L6,36" stroke="' + stroke + '" stroke-width="0.25"/>' +
      '<path d="M10,8 L14,12 M10,14 L15,18 M10,20 L16,24 M10,26 L15,30 M10,32 L14,36" stroke="' + stroke + '" stroke-width="0.25"/>' +
      '</svg>';
  }

  function createOliveSVG() {
    return '<svg viewBox="0 0 30 16" fill="none">' +
      '<ellipse cx="15" cy="8" rx="13" ry="5.5" fill="#7a9a6a" stroke="#5a7a4a" stroke-width="0.7"/>' +
      '<path d="M15,2.5 L15,13.5" stroke="#5a7a4a" stroke-width="0.5"/>' +
      '<path d="M15,5 L10,8 M15,8 L10,11 M15,5 L20,8 M15,8 L20,11" stroke="#5a7a4a" stroke-width="0.35" opacity="0.5"/>' +
      '</svg>';
  }

  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  var isEye = document.documentElement.getAttribute('data-theme') === 'eye-care';
  var theme = isDark ? 'dark' : (isEye ? 'eye-care' : 'light');

  for (var i = 0; i < count; i++) {
    var type = types[Math.floor(Math.random() * types.length)];
    var size = type === 'feather' ? 14 + Math.random() * 14 : 18 + Math.random() * 16;
    var el = document.createElement('div');
    el.className = 'falling-item';
    var svgContent = type === 'feather' ? createFeatherSVG(theme) : createOliveSVG();
    el.innerHTML = svgContent;
    el.style.width = size + 'px';
    el.style.height = (type === 'feather' ? size * 2.8 : size * 0.55) + 'px';
    el.style.left = (Math.random() * 100) + '%';
    el.style.top = (-20 - Math.random() * 80) + '%';
    el.style.opacity = 0.3 + Math.random() * 0.4;
    var duration = 12 + Math.random() * 18;
    el.style.animationDuration = duration + 's';
    el.style.animationDelay = (Math.random() * 5) + 's';
    container.appendChild(el);
  }

  var themeObserver = new MutationObserver(function() {
    var isDarkNow = document.documentElement.getAttribute('data-theme') === 'dark';
    var isEyeNow = document.documentElement.getAttribute('data-theme') === 'eye-care';
    var newTheme = isDarkNow ? 'dark' : (isEyeNow ? 'eye-care' : 'light');
    if (newTheme !== theme) {
      theme = newTheme;
      var items = container.querySelectorAll('.falling-item');
      items.forEach(function(el) {
        var svg = el.querySelector('svg');
        if (!svg) return;
        var paths = svg.querySelectorAll('path');
        if (paths.length > 0 && paths[0].getAttribute('fill')) {
          var color = theme === 'dark' ? '#d4cfc8' : (theme === 'eye-care' ? '#f0ebe0' : '#f5f0eb');
          var stroke = theme === 'dark' ? '#8a8a85' : (theme === 'eye-care' ? '#d5c8b8' : '#c9c0b8');
          paths[0].setAttribute('fill', color);
          paths[0].setAttribute('stroke', stroke);
          for (var i = 1; i < paths.length; i++) {
            paths[i].setAttribute('stroke', stroke);
          }
        }
      });
    }
  });
  themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
})();

(function(){
  var badge = document.getElementById('poem-count');
  if(!badge) return;
  fetch('poems/poems.json?t=' + Date.now()).then(function(r){ return r.json(); }).then(function(list){
    badge.textContent = list.length;
  }).catch(function(){ badge.textContent = '0'; });
})();

(function(){
  var btn = document.getElementById('music-toggle');
  var audio = document.getElementById('bg-music');
  var label = btn.querySelector('.label');
  var autoStarted = false;
  audio.volume = 0.35;
  function startPlaying(){
    if(autoStarted) return;
    audio.play().then(function(){
      autoStarted = true;
      btn.classList.add('playing');
      label.textContent = '暂停音乐';
    }).catch(function(){});
  }
  function stopPlaying(){
    audio.pause();
    btn.classList.remove('playing');
    label.textContent = '播放音乐';
  }
  btn.addEventListener('click', function(e){
    e.stopPropagation();
    if(audio.paused){ startPlaying(); } else { stopPlaying(); }
  });
  ['click','touchstart','keydown','scroll'].forEach(function(evt){
    window.addEventListener(evt, startPlaying, { once:true, passive:true });
  });
})();

(function(){
  var btns = document.querySelectorAll('#theme-side .theme-btn');
  if(!btns.length) return;
  function isNightTime() {
    var hour = new Date().getHours();
    return (hour >= 19 || hour < 6);
  }
  function applyTheme(theme) {
    if (theme === 'light') {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', theme);
    }
    localStorage.setItem('theme', theme);
    btns.forEach(function(btn){
      btn.classList.toggle('active', btn.getAttribute('data-theme') === theme);
    });
  }
  var saved = localStorage.getItem('theme');
  var initial;
  if (saved && (saved === 'light' || saved === 'dark' || saved === 'eye-care')) {
    initial = saved;
  } else {
    initial = isNightTime() ? 'dark' : 'light';
  }
  applyTheme(initial);
  btns.forEach(function(btn){
    btn.addEventListener('click', function(){
      applyTheme(this.getAttribute('data-theme'));
    });
  });
})();
</script>
</body>
</html>
