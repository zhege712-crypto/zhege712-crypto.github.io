<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伞 / 视觉作品集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:      #1c1c1b;
  --charcoal: #373735;
  --steel:    #74736f;
  --fog:      #b9b7b0;
  --paper:    #eceae5;
  --paper-2:  #e0ddd6;
  --white:    #faf9f6;
  --accent-red:    #e0393e;
  --accent-cobalt: #2f5fa8;
  --accent-gold:   #e8a33d;
  --font-display: 'Fraunces', serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --maxw: 1100px;
}

[data-theme="dark"] {
  --ink: #ecece5;
  --charcoal: #c4c4be;
  --steel: #8a8a85;
  --fog: #4a4a45;
  --paper: #1a1a19;
  --paper-2: #2a2a27;
  --white: #222221;
  --accent-red: #e55a5f;
  --accent-gold: #d4a373;
}
[data-theme="eye-care"] {
  --paper: #f5efe0;
  --paper-2: #ede5d0;
  --white: #faf5e8;
  --ink: #4a3f35;
  --charcoal: #6b5f52;
  --steel: #9a8b7a;
  --fog: #d5c8b8;
  --accent-red: #c46a52;
  --accent-gold: #c9a87a;
}

*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  line-height:1.6;
  overflow-x:hidden;
  transition: background 0.3s ease, color 0.3s ease;
}
img{ max-width:100%; display:block; }
a{ color:inherit; text-decoration:none; }
.wrap{ max-width:var(--maxw); margin:0 auto; padding:0 32px; }

/* ============================================================
   开幕动画遮罩
   ============================================================ */

#intro-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: #f5f0e8;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s ease;
  opacity: 1;
  visibility: visible;
  pointer-events: none;
}
#intro-overlay.hidden {
  opacity: 0;
  visibility: hidden;
}
#intro-overlay.skip {
  display: none;
}

/* ---- 背景 ---- */
.intro-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  background: radial-gradient(ellipse at 50% 70%, #f5f0e8, #e8e0d5);
}
.intro-bg .glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.2;
}
.intro-bg .glow-1 {
  width: 50%;
  height: 40%;
  top: 20%;
  left: 25%;
  background: #d4c8b8;
}
.intro-bg .glow-2 {
  width: 60%;
  height: 30%;
  bottom: 0;
  right: 0;
  background: #c4b8a8;
  opacity: 0.15;
}

/* ---- 极简星点（米黄背景下非常淡） ---- */
.intro-stars {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.intro-stars .star {
  position: absolute;
  border-radius: 50%;
  background: rgba(180, 170, 155, 0.15);
}
.intro-stars .star:nth-child(1) { width: 3px; height: 3px; top: 8%; left: 10%; }
.intro-stars .star:nth-child(2) { width: 2px; height: 2px; top: 20%; left: 85%; }
.intro-stars .star:nth-child(3) { width: 3px; height: 3px; top: 50%; left: 5%; }
.intro-stars .star:nth-child(4) { width: 2px; height: 2px; top: 70%; left: 90%; }
.intro-stars .star:nth-child(5) { width: 2px; height: 2px; top: 35%; left: 92%; }
.intro-stars .star:nth-child(6) { width: 3px; height: 3px; top: 82%; left: 18%; }
.intro-stars .star:nth-child(7) { width: 2px; height: 2px; top: 12%; left: 45%; }
.intro-stars .star:nth-child(8) { width: 2px; height: 2px; top: 55%; left: 40%; }

/* ---- Canvas ---- */
#wave-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  pointer-events: none;
  z-index: 2;
}

/* ---- 品牌浮现（缩小版） ---- */
#brand-container {
  position: absolute;
  z-index: 3;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.8s ease;
}
#brand-container.show {
  opacity: 1;
}

#brand-char {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: clamp(3.2rem, 8vw, 5.5rem);
  color: #4a3f35;
  letter-spacing: 0.05em;
  opacity: 0;
  transform: scale(0.8);
  transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.34, 1.2, 0.64, 1);
}
#brand-char.show {
  opacity: 1;
  transform: scale(1);
}

#brand-sub {
  font-family: var(--font-mono);
  font-size: clamp(0.5rem, 1vw, 0.75rem);
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: rgba(74, 63, 53, 0.2);
  margin-top: 6px;
  opacity: 0;
  transition: opacity 0.8s ease 0.2s;
}
#brand-sub.show {
  opacity: 1;
}

/* ---- 底部文字 ---- */
#intro-caption {
  position: absolute;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 0.45rem;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: rgba(74, 63, 53, 0.06);
  z-index: 4;
  pointer-events: none;
  opacity: 0;
  animation: captionFade 1.6s ease 2.2s forwards;
}
@keyframes captionFade {
  0% { opacity: 0; transform: translateX(-50%) translateY(4px); }
  100% { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@media (max-width: 640px) {
  #intro-caption { font-size: 0.35rem; bottom: 32px; }
  #brand-char { font-size: clamp(2.8rem, 10vw, 4rem); }
}

/* ============================================================
   首页内容
   ============================================================ */

.page-content {
  opacity: 0;
  transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.page-content.visible {
  opacity: 1;
}

.hero h1 .char {
  display: inline-block;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
}
.hero h1 .char.reveal {
  opacity: 1;
  transform: translateY(0);
}
.hero h1 .char.delay-1 { transition-delay: 0.04s; }
.hero h1 .char.delay-2 { transition-delay: 0.08s; }
.hero h1 .char.delay-3 { transition-delay: 0.12s; }
.hero h1 .char.delay-4 { transition-delay: 0.16s; }
.hero h1 .char.delay-5 { transition-delay: 0.20s; }
.hero h1 .char.delay-6 { transition-delay: 0.24s; }
.hero h1 .char.delay-7 { transition-delay: 0.28s; }
.hero h1 .char.delay-8 { transition-delay: 0.32s; }
.hero h1 .char.delay-9 { transition-delay: 0.36s; }
.hero h1 .char.delay-10 { transition-delay: 0.40s; }
.hero h1 .char.delay-11 { transition-delay: 0.44s; }
.hero h1 .char.delay-12 { transition-delay: 0.48s; }
.hero h1 .char.delay-13 { transition-delay: 0.52s; }
.hero h1 .char.delay-14 { transition-delay: 0.56s; }
.hero h1 .char.delay-15 { transition-delay: 0.60s; }
.hero h1 .char.delay-16 { transition-delay: 0.64s; }
.hero h1 .char.delay-17 { transition-delay: 0.68s; }
.hero h1 .char.delay-18 { transition-delay: 0.72s; }
.hero h1 .char.delay-19 { transition-delay: 0.76s; }
.hero h1 .char.delay-20 { transition-delay: 0.80s; }

.falling-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 40;
  overflow: hidden;
}
.falling-item {
  position: absolute;
  top: -60px;
  opacity: 0.2;
  will-change: transform;
  pointer-events: none;
  animation: fall linear infinite;
}
.falling-item svg {
  display: block;
  width: 100%;
  height: 100%;
}
@keyframes fall {
  0% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0.02; }
}

/* ============================================================
   原有样式
   ============================================================ */

header{ position:fixed; top:0; left:0; right:0; z-index:100; padding:22px 0; mix-blend-mode:difference; }
header .wrap{ display:flex; justify-content:space-between; align-items:center; }
.logo{ font-family:var(--font-display); font-weight:600; font-size:1.1rem; color:var(--white); }
nav.top-nav ul{ list-style:none; display:flex; gap:28px; }
nav.top-nav a{ font-family:var(--font-mono); font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--white); position:relative; padding-bottom:2px; }
nav.top-nav a::after{ content:''; position:absolute; left:0; bottom:0; width:0; height:1px; background:var(--white); transition:width 0.3s ease; }
nav.top-nav a:hover::after{ width:100%; }
@media (max-width:640px){ nav.top-nav ul{ gap:16px; } }

.side-nav{
  position:fixed; left:24px; top:120px; z-index:150; width:168px;
  background:rgba(255,255,255,0.6); backdrop-filter:blur(16px) saturate(180%); -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid rgba(255,255,255,0.6); border-radius:6px; padding:10px;
  box-shadow:0 10px 34px rgba(28,28,27,0.10), inset 0 1px 0 rgba(255,255,255,0.5);
  transition: background 0.3s ease, border-color 0.3s ease;
}
.side-nav a{ display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:2px; font-family:var(--font-body); font-size:0.88rem; color:var(--charcoal); transition:background 0.25s ease, color 0.25s ease; }
.side-nav a:hover{ background:var(--paper-2); }
.side-nav a.active{ background:var(--paper-2); color:var(--ink); font-weight:600; }
.side-nav a svg{ width:17px; height:17px; flex-shrink:0; stroke:currentColor; fill:none; stroke-width:1.6; }
.side-nav a .badge{ margin-left:auto; font-family:var(--font-mono); font-size:0.65rem; background:var(--paper); color:var(--steel); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; }
.side-nav a.active .badge{ background:var(--accent-gold); color:var(--white); }
@media (max-width:1180px){ .side-nav{ display:none; } }

.side-theme{
  position:fixed; left:24px; bottom:100px; z-index:150;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  background:rgba(255,255,255,0.4); backdrop-filter:blur(12px);
  padding:10px 8px; border-radius:28px; border:1px solid var(--fog);
  transition: background 0.3s ease, border-color 0.3s ease;
}
.side-theme .theme-btn{
  width:34px; height:34px; border-radius:50%; border:none;
  background:transparent; cursor:pointer;
  transition:background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
  display:flex; align-items:center; justify-content:center;
  padding:0;
}
.side-theme .theme-btn svg{
  width:22px; height:22px; stroke:var(--charcoal); stroke-width:1.8;
  fill:none; display:block;
  transition: stroke 0.25s ease;
}
.side-theme .theme-btn:hover{ background:var(--paper-2); transform:scale(1.08); }
.side-theme .theme-btn.active{
  background:var(--accent-gold);
  box-shadow:0 0 0 2px var(--accent-gold);
}
.side-theme .theme-btn.active svg{ stroke:var(--white); }
.side-theme .line{
  width:2px; height:10px; background:var(--fog); border-radius:1px;
  transition: background 0.3s ease;
}
@media (max-width:1180px){ .side-theme{ display:none; } }

.hero{ min-height:100vh; display:flex; flex-direction:column; justify-content:center; position:relative; padding-top:100px; background:var(--paper); }
.hero-eyebrow{ font-family:var(--font-mono); font-size:0.75rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--steel); margin-bottom:18px; display:flex; align-items:center; gap:10px; }
.hero-eyebrow::before{ content:''; width:22px; height:1px; background:var(--accent-red); }
.hero h1{ font-family:var(--font-display); font-weight:500; font-size:clamp(2.6rem, 7vw, 5.4rem); line-height:1.05; letter-spacing:-0.01em; max-width:820px; }
.hero h1 em{ font-style:italic; font-weight:300; color:var(--steel); }
.hero-desc{ margin-top:26px; max-width:480px; color:var(--charcoal); font-size:1.02rem; }
.hero-olive{ width:34px; height:34px; color:var(--accent-gold); opacity:0.85; margin-bottom:20px; }
.hero-divider{ width:110px; height:11px; color:var(--fog); margin:26px 0 0; display:block; }
.hero-scroll{ position:absolute; bottom:40px; left:32px; font-family:var(--font-mono); font-size:0.7rem; color:var(--steel); display:flex; align-items:center; gap:10px; letter-spacing:0.1em; }
.hero-scroll .line{ width:1px; height:40px; background:var(--fog); position:relative; overflow:hidden; }
.hero-scroll .line::after{ content:''; position:absolute; top:-40px; left:0; width:100%; height:40px; background:var(--accent-red); animation:scrollline 2s ease-in-out infinite; }
@keyframes scrollline{ 50%{ top:40px; } 100%{ top:40px; } }

.entry-grid{ padding:0 0 140px; display:grid; grid-template-columns:repeat(3,1fr); gap:2px; background:var(--paper-2); }
.entry-card{
  background:var(--paper); padding:44px 32px; min-height:220px;
  display:flex; flex-direction:column; justify-content:space-between;
  transition:background 0.35s ease, color 0.35s ease;
}
.entry-card:hover{ background:var(--ink); color:var(--white); }
.entry-num{ font-family:var(--font-mono); font-size:0.7rem; color:var(--accent-red); letter-spacing:0.1em; }
.entry-card h3{ font-family:var(--font-display); font-weight:500; font-size:1.6rem; margin-top:auto; }
.entry-arrow{ font-family:var(--font-mono); font-size:0.75rem; margin-top:14px; color:var(--steel); }
.entry-card:hover .entry-arrow{ color:var(--accent-gold); }
@media (max-width:900px){ .entry-grid{ grid-template-columns:1fr 1fr; } }
@media (max-width:640px){ .entry-grid{ grid-template-columns:1fr; } }

footer{ padding:30px 0; text-align:center; font-family:var(--font-mono); font-size:0.68rem; color:var(--steel); background:var(--ink); }

#music-toggle{ position:fixed; right:28px; bottom:28px; z-index:200; width:56px; height:56px; border-radius:50%; background:var(--ink); border:1px solid var(--charcoal); display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.25); transition:border-color 0.3s ease; }
#music-toggle:hover{ border-color:var(--accent-gold); }
#music-toggle .ring{ position:absolute; inset:-4px; border-radius:50%; border:1px solid var(--accent-gold); opacity:0; transform:scale(0.85); transition:opacity 0.3s ease; }
#music-toggle.playing .ring{ opacity:1; animation: pulse-ring 1.8s ease-out infinite; }
@keyframes pulse-ring{ 0%{ transform:scale(0.85); opacity:0.8; } 100%{ transform:scale(1.35); opacity:0; } }
#music-toggle .bars{ display:flex; align-items:flex-end; gap:3px; height:16px; }
#music-toggle .bars span{ width:3px; background:var(--fog); border-radius:1px; height:6px; transition:background 0.3s ease; }
#music-toggle.playing .bars span{ background:var(--accent-gold); }
#music-toggle.playing .bars span:nth-child(1){ animation:bar1 1.1s ease-in-out infinite; }
#music-toggle.playing .bars span:nth-child(2){ animation:bar2 0.9s ease-in-out infinite; }
#music-toggle.playing .bars span:nth-child(3){ animation:bar3 1.3s ease-in-out infinite; }
@keyframes bar1{ 0%,100%{ height:6px; } 50%{ height:16px; } }
@keyframes bar2{ 0%,100%{ height:10px; } 50%{ height:4px; } }
@keyframes bar3{ 0%,100%{ height:6px; } 50%{ height:14px; } }
#music-toggle .label{ position:absolute; right:66px; top:50%; transform:translateY(-50%); font-family:var(--font-mono); font-size:0.68rem; color:var(--white); background:var(--ink); padding:6px 10px; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
#music-toggle:hover .label{ opacity:1; }
@media (max-width:640px){ #music-toggle{ right:18px; bottom:18px; width:50px; height:50px; } #music-toggle .label{ display:none; } }
</style>
</head>

<section class="hero">

<!-- ============================================================
   持续飘落物
   ============================================================ -->

<div class="falling-container" id="falling-container"></div>

<audio id="bg-music" loop preload="none">
  <source src="music/background.mp3" type="audio/mpeg">
</audio>
<button id="music-toggle" type="button" aria-label="播放音乐">
  <span class="ring"></span>
  <span class="bars"><span></span><span></span><span></span></span>
  <span class="label">播放音乐</span>

<script>
// ============================================================
// 浮世绘·潮涌（米黄版 · 加速）
// ============================================================

(function() {
  var overlay = document.getElementById('intro-overlay');
  var canvas = document.getElementById('wave-canvas');
  var ctx = canvas.getContext('2d');
  var pageContent = document.getElementById('page-content');
  var brandContainer = document.getElementById('brand-container');
  var brandChar = document.getElementById('brand-char');
  var brandSub = document.getElementById('brand-sub');

  // ===== 尺寸 =====
  var W, H, cx, cy;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2;
    cy = H * 0.55;
  }
  resize();
  window.addEventListener('resize', resize);

  // ===== 波浪配置（加速版） =====
  var NUM_WAVES = 5;
  var waves = [];
  var startTime = null;
  var animId = null;
  var brandRevealed = false;
  var pageShown = false;

  function rand(min, max) { return min + Math.random() * (max - min); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

  function initWaves() {
    waves = [];
    for (var i = 0; i < NUM_WAVES; i++) {
      waves.push({
        progress: -0.3 - i * 0.10,
        speed: 0.012 + rand(0.003, 0.010),
        amplitude: 30 + rand(15, 50) + i * 3,
        frequency: 0.015 + rand(0.003, 0.008),
        phase: rand(0, Math.PI * 2),
        // 米黄/金色系
        baseR: 200 + i * 4,
        baseG: 185 - i * 3,
        baseB: 165 - i * 5,
        foamR: 210 + i * 3,
        foamG: 195 - i * 2,
        foamB: 175 - i * 4,
        foamMin: 0.4 + rand(0.1, 0.4),
        foamMax: 1.8 + rand(0.5, 1.5) + i * 0.2,
        baseY: 0.90 - i * 0.04,
        triggered: false
      });
    }
  }
  initWaves();

  // ===== 绘制单层波浪（米黄版） =====
  function drawWave(ctx, wave, time) {
    var p = wave.progress;
    if (p < -0.1 || p > 1.2) return;

    var progressY = clamp(p, 0, 1);
    var eased = 1 - Math.pow(1 - progressY, 1.2);
    var baseY = wave.baseY * H;
    var targetY = H * 0.30;
    var currentY = lerp(baseY, targetY, eased);

    var amp = wave.amplitude * (0.6 + 0.4 * (1 - progressY));
    var freq = wave.frequency;
    var phase = wave.phase + time * 0.0003;

    // ---- 波浪主体 ----
    var alpha = 0.18 * (1 - progressY * 0.4) * (0.8 + 0.2 * Math.sin(time * 0.0002 + wave.progress * 2));
    var r = wave.baseR, g = wave.baseG, b = wave.baseB;

    ctx.save();
    ctx.globalAlpha = Math.min(alpha, 0.3);

    var steps = 50;
    var points = [];
    for (var i = 0; i <= steps; i++) {
      var t = i / steps;
      var x = t * W;
      var yOffset = Math.sin(t * W * freq + phase) * amp * (1 - t * 0.25);
      var y = currentY + yOffset;
      points.push({ x: x, y: y });
    }

    ctx.beginPath();
    ctx.moveTo(points[0].x, H);
    for (var i = 0; i < points.length; i++) {
      ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.lineTo(points[points.length - 1].x, H);
    ctx.closePath();

    var grad = ctx.createLinearGradient(0, currentY, 0, H);
    grad.addColorStop(0, 'rgba(' + r + ',' + g + ',' + b + ',0.25)');
    grad.addColorStop(0.5, 'rgba(' + r + ',' + g + ',' + b + ',0.10)');
    grad.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0.01)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    // ---- 泡沫边缘（粗细变化） ----
    var foamAlpha = 0.5 * (1 - progressY * 0.4) * (0.7 + 0.3 * Math.sin(time * 0.0003 + wave.progress * 3));
    if (foamAlpha < 0.02) return;

    ctx.save();
    ctx.globalAlpha = Math.min(foamAlpha, 0.7);

    var fr = wave.foamR, fg = wave.foamG, fb = wave.foamB;
    var foamColor = 'rgba(' + fr + ',' + fg + ',' + fb + ',';

    var segments = 60;
    for (var i = 0; i < segments; i++) {
      var t1 = i / segments;
      var t2 = (i + 1) / segments;
      var idx1 = Math.floor(t1 * steps);
      var idx2 = Math.floor(t2 * steps);
      idx1 = Math.min(idx1, points.length - 2);
      idx2 = Math.min(idx2, points.length - 2);

      var p1 = points[idx1];
      var p2 = points[idx2];
      if (!p1 || !p2) continue;

      var noise1 = Math.sin(i * 0.5 + wave.progress * 8) * 0.5 + 0.5;
      var noise2 = Math.sin(i * 0.13 + wave.progress * 6 + 1.2) * 0.5 + 0.5;
      var noise3 = Math.sin(i * 0.07 + time * 0.0001 + 0.8) * 0.5 + 0.5;
      var mix = (noise1 * 0.5 + noise2 * 0.3 + noise3 * 0.2);
      var edgeFactor = 1 - Math.abs(t1 - 0.5) * 0.4;
      var width = lerp(wave.foamMin, wave.foamMax, mix) * edgeFactor * (0.8 + 0.2 * (1 - progressY));
      var segAlpha = 0.3 + 0.7 * (width / wave.foamMax);

      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.lineWidth = width;
      ctx.strokeStyle = foamColor + (segAlpha * 0.7) + ')';
      ctx.lineCap = 'round';
      ctx.stroke();

      if (width > wave.foamMax * 0.4 && i % 3 === 0) {
        ctx.beginPath();
        var offsetY = -width * 0.25 * (0.5 + 0.5 * Math.sin(i * 0.7 + 1.5));
        ctx.moveTo(p1.x, p1.y + offsetY);
        ctx.lineTo(p2.x, p2.y + offsetY);
        ctx.lineWidth = width * 0.25;
        ctx.strokeStyle = foamColor + (segAlpha * 0.15) + ')';
        ctx.stroke();
      }
    }

    // ---- 卷曲浪尖 ----
    if (progressY > 0.2 && progressY < 0.7) {
      var curlAlpha = 0.25 * (1 - Math.abs(progressY - 0.45) * 2) * 0.8;
      if (curlAlpha > 0.05) {
        var curlPos = 0.3 + 0.4 * Math.sin(time * 0.0002 + wave.progress * 5 + 1.2) * 0.5 + 0.5;
        var curlIdx = Math.floor(curlPos * steps);
        curlIdx = Math.min(curlIdx, points.length - 3);
        var cp = points[curlIdx];
        if (cp) {
          ctx.globalAlpha = curlAlpha;
          ctx.strokeStyle = 'rgba(200, 185, 165, 0.25)';
          ctx.lineWidth = 1.0 + 0.4 * (1 - progressY);
          ctx.beginPath();
          var curlLen = 15 + 25 * (1 - progressY);
          var angle = -0.8 + 0.6 * Math.sin(time * 0.0003 + wave.progress * 6 + curlIdx);
          ctx.moveTo(cp.x, cp.y);
          ctx.quadraticCurveTo(
            cp.x + Math.cos(angle) * curlLen * 0.6,
            cp.y + Math.sin(angle) * curlLen * 0.6 - 6,
            cp.x + Math.cos(angle + 0.5) * curlLen * 0.8,
            cp.y + Math.sin(angle + 0.5) * curlLen * 0.8 - 12
          );
          ctx.stroke();
        }
      }
    }

    // ---- 飞沫 ----
    if (progressY > 0.15 && progressY < 0.6) {
      var sprayAlpha = 0.05 * (1 - Math.abs(progressY - 0.35) * 2.5);
      if (sprayAlpha > 0.005) {
        ctx.save();
        ctx.globalAlpha = sprayAlpha;
        var numSpray = 8 + Math.floor(12 * (1 - progressY));
        for (var i = 0; i < numSpray; i++) {
          var idx = Math.floor(rand(0, steps));
          var p = points[idx];
          if (!p) continue;
          var dx = p.x + rand(-15, 15);
          var dy = p.y + rand(-25, 8);
          var size = rand(0.5, 1.5) * (1 - progressY * 0.3);
          ctx.fillStyle = 'rgba(200, 190, 175, ' + rand(0.2, 0.5) + ')';
          ctx.beginPath();
          ctx.arc(dx, dy, size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    ctx.restore();
  }

  // ===== 动画循环（加速版） =====
  function animate(time) {
    if (!startTime) startTime = time;
    var elapsed = time - startTime;

    ctx.clearRect(0, 0, W, H);

    var allDone = true;
    for (var i = 0; i < waves.length; i++) {
      var wave = waves[i];
      // 速度加快
      wave.progress += wave.speed * 0.8;

      if (!wave.triggered && wave.progress > 0.50) {
        wave.triggered = true;
        if (!brandRevealed) {
          brandRevealed = true;
          revealBrand();
        }
      }

      drawWave(ctx, wave, elapsed);
      if (wave.progress < 1.1) allDone = false;
    }

    // 加速完成
    if (allDone && !pageShown && elapsed > 2800) {
      pageShown = true;
      setTimeout(function() {
        pageContent.classList.add('visible');
        setTimeout(function() {
          overlay.classList.add('hidden');
          setTimeout(function() {
            overlay.style.display = 'none';
            if (canvas) { canvas.width = 0; canvas.height = 0; }
          }, 600);
        }, 300);
        setTimeout(triggerTitleReveal, 400);
      }, 300);
    }

    animId = requestAnimationFrame(animate);
  }

  // ===== 品牌浮现 =====
  function revealBrand() {
    brandContainer.classList.add('show');
    setTimeout(function() {
      brandChar.classList.add('show');
    }, 200);
    setTimeout(function() {
      brandSub.classList.add('show');
    }, 500);
  }

  // ===== 标题逐字显现 =====
  function triggerTitleReveal() {
    var titleEl = document.getElementById('hero-title');
    if (!titleEl || titleEl.dataset.split) return;

    var parts = [];
    var emContent = titleEl.querySelector('em');
    var fullText = titleEl.textContent;
    var emText = emContent ? emContent.textContent : '';

    if (emContent) {
      var before = fullText.split(emText)[0] || '';
      var after = fullText.split(emText)[1] || '';
      parts.push({ type: 'text', content: before });
      parts.push({ type: 'em', content: emText });
      parts.push({ type: 'text', content: after });
    } else {
      parts.push({ type: 'text', content: fullText });
    }

    var finalHtml = '';
    var charIdx = 0;
    parts.forEach(function(part) {
      if (part.type === 'text') {
        for (var i = 0; i < part.content.length; i++) {
          var ch = part.content[i];
          if (ch === ' ' || ch === '\n' || ch === '\r') {
            finalHtml += ch;
          } else {
            var cls = 'char delay-' + Math.min(charIdx + 1, 20);
            finalHtml += '<span class="' + cls + '">' + ch + '</span>';
            charIdx++;
          }
        }
      } else if (part.type === 'em') {
        finalHtml += '<em>';
        for (var i = 0; i < part.content.length; i++) {
          var ch = part.content[i];
          var cls = 'char delay-' + Math.min(charIdx + 1, 20);
          finalHtml += '<span class="' + cls + '">' + ch + '</span>';
          charIdx++;
        }
        finalHtml += '</em>';
      }
    });

    titleEl.innerHTML = finalHtml;
    titleEl.dataset.split = '1';

    var chars = titleEl.querySelectorAll('.char');
    chars.forEach(function(el, index) {
      setTimeout(function() {
        el.classList.add('reveal');
      }, index * 35);
    });
  }

  // ===== 启动 =====
  if (sessionStorage.getItem('intro_wave_shown')) {
    overlay.classList.add('skip');
    pageContent.classList.add('visible');
    return;
  }

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    overlay.classList.add('skip');
    pageContent.classList.add('visible');
    return;
  }

  sessionStorage.setItem('intro_wave_shown', '1');

  requestAnimationFrame(function() {
    setTimeout(function() {
      startTime = null;
      animId = requestAnimationFrame(animate);
    }, 80);
  });

})();

// ============================================================
// 持续飘落物
// ============================================================

(function() {
  var container = document.getElementById('falling-container');
  if (!container) return;

  var count = 8;
  var types = ['feather', 'olive'];

  function createFeatherSVG(theme) {
    var color = theme === 'dark' ? '#d4cfc8' : (theme === 'eye-care' ? '#f0ebe0' : '#f5f0eb');
    var stroke = theme === 'dark' ? '#8a8a85' : (theme === 'eye-care' ? '#d5c8b8' : '#c9c0b8');
    return '<svg viewBox="0 0 20 60" fill="none" stroke="' + stroke + '" stroke-width="0.5">' +
      '<path d="M10,2 Q16,12 14,22 Q12,32 10,42 Q8,32 6,22 Q4,12 10,2" fill="' + color + '"/>' +
      '<path d="M10,2 L10,42" stroke="' + stroke + '" stroke-width="0.3"/>' +
      '<path d="M10,8 L6,12 M10,14 L5,18 M10,20 L4,24 M10,26 L5,30 M10,32 L6,36" stroke="' + stroke + '" stroke-width="0.25"/>' +
      '<path d="M10,8 L14,12 M10,14 L15,18 M10,20 L16,24 M10,26 L15,30 M10,32 L14,36" stroke="' + stroke + '" stroke-width="0.25"/>' +
      '</svg>';
  }

  function createOliveSVG() {
    return '<svg viewBox="0 0 30 16" fill="none">' +
      '<ellipse cx="15" cy="8" rx="13" ry="5.5" fill="#7a9a6a" stroke="#5a7a4a" stroke-width="0.7"/>' +
      '<path d="M15,2.5 L15,13.5" stroke="#5a7a4a" stroke-width="0.5"/>' +
      '<path d="M15,5 L10,8 M15,8 L10,11 M15,5 L20,8 M15,8 L20,11" stroke="#5a7a4a" stroke-width="0.35" opacity="0.5"/>' +
      '</svg>';
  }

  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  var isEye = document.documentElement.getAttribute('data-theme') === 'eye-care';
  var theme = isDark ? 'dark' : (isEye ? 'eye-care' : 'light');

  for (var i = 0; i < count; i++) {
    var type = types[Math.floor(Math.random() * types.length)];
    var size = type === 'feather' ? 14 + Math.random() * 14 : 18 + Math.random() * 16;
    var el = document.createElement('div');
    el.className = 'falling-item';
    var svgContent = type === 'feather' ? createFeatherSVG(theme) : createOliveSVG();
    el.innerHTML = svgContent;
    el.style.width = size + 'px';
    el.style.height = (type === 'feather' ? size * 2.8 : size * 0.55) + 'px';
    el.style.left = (Math.random() * 100) + '%';
    el.style.top = (-20 - Math.random() * 80) + '%';
    el.style.opacity = 0.3 + Math.random() * 0.4;
    var duration = 12 + Math.random() * 18;
    el.style.animationDuration = duration + 's';
    el.style.animationDelay = (Math.random() * 5) + 's';
    container.appendChild(el);
  }

  var themeObserver = new MutationObserver(function() {
    var isDarkNow = document.documentElement.getAttribute('data-theme') === 'dark';
    var isEyeNow = document.documentElement.getAttribute('data-theme') === 'eye-care';
    var newTheme = isDarkNow ? 'dark' : (isEyeNow ? 'eye-care' : 'light');
    if (newTheme !== theme) {
      theme = newTheme;
      var items = container.querySelectorAll('.falling-item');
      items.forEach(function(el) {
        var svg = el.querySelector('svg');
        if (!svg) return;
        var paths = svg.querySelectorAll('path');
        if (paths.length > 0 && paths[0].getAttribute('fill')) {
          var color = theme === 'dark' ? '#d4cfc8' : (theme === 'eye-care' ? '#f0ebe0' : '#f5f0eb');
          var stroke = theme === 'dark' ? '#8a8a85' : (theme === 'eye-care' ? '#d5c8b8' : '#c9c0b8');
          paths[0].setAttribute('fill', color);
          paths[0].setAttribute('stroke', stroke);
          for (var i = 1; i < paths.length; i++) {
            paths[i].setAttribute('stroke', stroke);
          }
        }
      });
    }
  });
  themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
})();

// ============================================================
// 原有功能
// ============================================================

(function(){
  var badge = document.getElementById('poem-count');
  if(!badge) return;
  fetch('poems/poems.json?t=' + Date.now()).then(function(r){ return r.json(); }).then(function(list){
    badge.textContent = list.length;
  }).catch(function(){ badge.textContent = '0'; });
})();

(function(){
  var btn = document.getElementById('music-toggle');
  var audio = document.getElementById('bg-music');
  var label = btn.querySelector('.label');
  var autoStarted = false;
  audio.volume = 0.35;
  function startPlaying(){
    if(autoStarted) return;
    audio.play().then(function(){
      autoStarted = true;
      btn.classList.add('playing');
      label.textContent = '暂停音乐';
    }).catch(function(){});
  }
  function stopPlaying(){
    audio.pause();
    btn.classList.remove('playing');
    label.textContent = '播放音乐';
  }
  btn.addEventListener('click', function(e){
    e.stopPropagation();
    if(audio.paused){ startPlaying(); } else { stopPlaying(); }
  });
  ['click','touchstart','keydown','scroll'].forEach(function(evt){
    window.addEventListener(evt, startPlaying, { once:true, passive:true });
  });
})();

(function(){
  var btns = document.querySelectorAll('#theme-side .theme-btn');
  if(!btns.length) return;
  function isNightTime() {
    var hour = new Date().getHours();
    return (hour >= 19 || hour < 6);
  }
  function applyTheme(theme) {
    if (theme === 'light') {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', theme);
    }
    localStorage.setItem('theme', theme);
    btns.forEach(function(btn){
      btn.classList.toggle('active', btn.getAttribute('data-theme') === theme);
    });
  }
  var saved = localStorage.getItem('theme');
  var initial;
  if (saved && (saved === 'light' || saved === 'dark' || saved === 'eye-care')) {
    initial = saved;
  } else {
    initial = isNightTime() ? 'dark' : 'light';
  }
  applyTheme(initial);
  btns.forEach(function(btn){
    btn.addEventListener('click', function(){
      applyTheme(this.getAttribute('data-theme'));
    });
  });
})();
</script>
